<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級聯絡簿 - 學生專區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans pb-10">

    <header class="bg-gradient-to-r from-teal-500 to-green-600 text-white shadow-md rounded-b-3xl pb-6">
        <div class="p-4 flex justify-between items-center">
            <h1 class="text-lg font-bold"><i class="fas fa-chalkboard mr-2"></i>線上公佈欄</h1>
            <button onclick="logout()" class="text-teal-100 hover:text-white text-sm bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm transition"><i class="fas fa-sign-out-alt"></i> 登出</button>
        </div>
        <div class="px-6 flex items-center mt-2">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-teal-600 text-3xl font-bold border-4 border-teal-200 shadow-sm">
                <i class="fas fa-users"></i>
            </div>
            <div class="ml-4 flex-1">
                <p class="text-teal-100 text-sm mb-1">歡迎登入</p>
                <h2 class="text-2xl font-bold" id="display-class-name">載入中...</h2>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">
        
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex justify-between items-center border border-gray-100">
            <h3 class="font-bold text-gray-700"><i class="far fa-calendar-alt text-teal-500 mr-2"></i>選擇日期</h3>
            <input type="date" id="work-date" class="bg-gray-50 border border-gray-300 text-gray-800 text-sm rounded-lg p-2 focus:ring-2 focus:ring-teal-500 outline-none font-bold">
        </div>

        <div id="loading-msg" class="text-center text-teal-500 py-8 hidden">
            <i class="fas fa-spinner fa-spin mr-2 text-2xl"></i><p class="mt-2 font-bold">讀取聯絡簿中...</p>
        </div>

        <div id="announcement-section"></div>

    </main>

    <script>
        // 🚨 您的 GAS 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbwunBwJT2u3gpAcnibQW4RBOQhuzQXLtcirT4_6G6fG9FgwJjTAApax5fU0VZ1dNvdRog/exec";
        
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const userRole = sessionStorage.getItem('userRole');
        const stuClass = sessionStorage.getItem('studentClass');
        const stuName = sessionStorage.getItem('studentName'); // 學生端的 Name 其實是班級名稱 (如 807班)

        // 🟢 讀取本地記憶的字體大小，預設為 16px
        let currentFontSize = parseInt(localStorage.getItem('studentFontSize')) || 16;

        if (!isLoggedIn || userRole !== 'student') { 
            alert('請先以學生(班級)身分登入！'); 
            window.location.href = 'login.html'; 
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('display-class-name').innerText = stuName || `${stuClass}班`;
            
            const dateInput = document.getElementById('work-date');
            const today = new Date(); 
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            dateInput.value = `${yyyy}-${mm}-${dd}`;
            
            // 監聽日期改變
            dateInput.addEventListener('change', () => { loadAnnouncement(); });
            
            // 初始載入
            loadAnnouncement();
        });

        // 🟢 控制字體縮放與記憶功能
        function adjustFontSize(change) {
            if (change === 0) {
                currentFontSize = 16; // 重置為預設
            } else {
                currentFontSize += change;
                if (currentFontSize < 14) currentFontSize = 14; // 最小限制
                if (currentFontSize > 36) currentFontSize = 36; // 最大限制
            }
            
            // 記憶使用者的偏好
            localStorage.setItem('studentFontSize', currentFontSize);

            // 動態套用到文字與行高
            const textEl = document.getElementById('announcement-text');
            if (textEl) {
                textEl.style.fontSize = currentFontSize + 'px';
                // 讓行高隨著字體等比例放大，避免文字擠在一起
                textEl.style.lineHeight = (currentFontSize * 1.6) + 'px'; 
            }
        }

        async function loadAnnouncement() {
            const date = document.getElementById('work-date').value;
            const loadingMsg = document.getElementById('loading-msg');
            const section = document.getElementById('announcement-section');
            
            section.innerHTML = '';
            loadingMsg.classList.remove('hidden');

            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'loadAnnouncement', date: date, className: stuClass }) 
                });
                const result = await response.json();
                
                if(result.success) {
                    if (!result.content && !result.fileUrl) {
                        section.innerHTML = `
                            <div class="bg-gray-50 rounded-xl border border-gray-200 p-8 text-center text-gray-500 mt-4 shadow-inner">
                                <i class="fas fa-box-open text-4xl mb-3 text-gray-300"></i>
                                <p class="font-bold">本日尚無發布聯絡簿</p>
                            </div>`;
                        return;
                    }

                    // 🟢 將記憶的字體大小套用到 HTML 中
                    let contentHtml = result.content 
                        ? `<div id="announcement-text" class="text-gray-800 whitespace-pre-wrap mb-4 transition-all duration-300" style="font-size: ${currentFontSize}px; line-height: ${currentFontSize * 1.6}px;">${result.content}</div>` 
                        : '';

                    let attachmentHtml = '';
                    if (result.fileUrl) {
                        let fileIdMatch = result.fileUrl.match(/[-\w]{25,}/);
                        let fileId = fileIdMatch ? fileIdMatch[0] : '';
                        
                        let imgTag = fileId ? `<div class="mt-3 text-center"><img src="https://drive.google.com/thumbnail?id=${fileId}&sz=w800" class="max-w-full rounded-lg shadow-md border border-teal-200 mx-auto" onerror="this.style.display='none';"></div>` : '';
                        
                        attachmentHtml = `
                            <div class="mt-2 pt-3 border-t border-teal-100">
                                <p class="text-sm font-bold text-teal-800 mb-2"><i class="fas fa-paperclip mr-1"></i>本日附件：<a href="${result.fileUrl}" target="_blank" class="text-blue-600 underline hover:text-blue-800">點此開啟原始檔案</a></p>
                                ${imgTag}
                            </div>`;
                    }

                    // 🟢 在標題列加入字體控制按鈕
                    section.innerHTML = `
                        <div class="bg-white rounded-2xl border-t-4 border-teal-500 p-5 shadow-md">
                            <div class="flex justify-between items-center border-b border-gray-100 pb-3 mb-4">
                                <h4 class="text-base font-black text-teal-700 flex items-center">
                                    <i class="fas fa-book-open mr-2"></i> ${date.replace(/-/g, '/')} 聯絡簿
                                </h4>
                                <div class="flex gap-1 bg-gray-50 p-1 rounded-lg border border-gray-200 shadow-sm">
                                    <button onclick="adjustFontSize(-2)" class="w-8 h-8 rounded bg-white text-gray-500 hover:bg-teal-100 hover:text-teal-700 font-bold text-sm shadow-sm transition" title="縮小"><i class="fas fa-minus"></i></button>
                                    <button onclick="adjustFontSize(0)" class="w-8 h-8 rounded bg-white text-gray-500 hover:bg-teal-100 hover:text-teal-700 font-bold text-sm shadow-sm transition" title="預設">A</button>
                                    <button onclick="adjustFontSize(2)" class="w-8 h-8 rounded bg-white text-gray-500 hover:bg-teal-100 hover:text-teal-700 font-bold text-sm shadow-sm transition" title="放大"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                            
                            ${contentHtml}
                            ${attachmentHtml}
                            
                            <p class="text-xs text-gray-400 mt-4 text-right border-t border-gray-50 pt-3"><i class="fas fa-user-edit mr-1"></i>發布者：${result.teacher || '老師/學藝股長'}</p>
                        </div>`;
                } else {
                    section.innerHTML = `<div class="text-red-500 bg-red-50 p-4 rounded-lg font-bold border border-red-200"><i class="fas fa-exclamation-triangle mr-2"></i>無法獲取資料：${result.message}</div>`;
                }
            } catch(e) {
                section.innerHTML = `<div class="text-red-500 bg-red-50 p-4 rounded-lg font-bold border border-red-200"><i class="fas fa-wifi mr-2"></i>網路連線異常，請稍後再試。</div>`;
            } finally {
                loadingMsg.classList.add('hidden');
            }
        }

        function logout() { 
            sessionStorage.clear(); 
            window.location.href = 'login.html'; 
        }
    </script>
</body>
</html>
