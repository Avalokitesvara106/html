<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家長專區 - 班級管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans pb-12">

    <header class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-md rounded-b-3xl pb-6 relative z-10">
        <div class="p-4 flex justify-between items-center">
            <h1 class="text-lg font-bold"><i class="fas fa-user-friends mr-2"></i>家長專區</h1>
            <div>
                <button onclick="openChangePwdModal()" class="text-indigo-100 hover:text-white text-sm bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm transition mr-2"><i class="fas fa-key"></i> 密碼</button>
                <button onclick="logout()" class="text-indigo-100 hover:text-white text-sm bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm transition"><i class="fas fa-sign-out-alt"></i> 登出</button>
            </div>
        </div>
        <div class="px-6 flex items-center mt-2">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-purple-600 text-3xl font-bold border-4 border-purple-300 shadow-sm">
                <i class="fas fa-child"></i>
            </div>
            <div class="ml-4 flex-1">
                <p class="text-indigo-100 text-sm mb-1"><span id="display-class" class="font-bold"></span></p>
                <h2 class="text-2xl font-bold" id="display-name">載入中...</h2>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">
        
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex justify-between items-center border border-gray-100 relative z-0">
            <div class="flex items-center">
                <i class="far fa-calendar-alt text-purple-500 mr-2 text-lg"></i>
                <input type="date" id="work-date" class="bg-gray-50 border border-gray-300 text-gray-800 text-sm rounded-lg p-2 focus:ring-2 focus:ring-purple-500 outline-none font-bold">
            </div>
            <button onclick="document.getElementById('leave-modal').classList.remove('hidden')" class="bg-purple-100 text-purple-700 font-bold px-3 py-2 rounded-lg hover:bg-purple-200 transition text-sm flex items-center shadow-sm">
                <i class="fas fa-pen-alt mr-1"></i> 請假單
            </button>
        </div>

        <div id="loading-msg" class="text-center text-purple-500 py-8">
            <i class="fas fa-spinner fa-spin mr-2 text-2xl"></i><p class="mt-2 font-bold">為您整理今日報表中...</p>
        </div>

        <div id="report-content" class="hidden space-y-6">
            
            <div id="announcement-section"></div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-blue-50 p-3 border-b border-blue-100 flex items-center">
                    <i class="fas fa-user-check text-blue-500 mr-2"></i><h3 class="font-bold text-blue-800">今日出缺席</h3>
                </div>
                <div id="attendance-list" class="p-4 divide-y divide-gray-50 text-sm"></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-yellow-50 p-3 border-b border-yellow-100 flex items-center">
                    <i class="fas fa-clipboard-list text-yellow-600 mr-2"></i><h3 class="font-bold text-yellow-800">作業與物品繳交</h3>
                </div>
                <div id="submission-list" class="p-4 divide-y divide-gray-50 text-sm"></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-green-50 p-3 border-b border-green-100 flex items-center">
                    <i class="fas fa-marker text-green-600 mr-2"></i><h3 class="font-bold text-green-800">今日成績紀錄</h3>
                </div>
                <div id="score-list" class="p-4 divide-y divide-gray-50 text-sm"></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden p-4 mb-6">
                <h3 class="font-bold text-gray-700 mb-3 text-center"><i class="fas fa-chart-line text-indigo-500 mr-2"></i>近五日成績平均趨勢</h3>
                <div class="relative h-48 w-full"><canvas id="scoreChart"></canvas></div>
            </div>

        </div>
    </main>

    <div id="leave-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all">
            <div class="bg-purple-600 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fas fa-paper-plane mr-2"></i>線上請假單</h3>
                <button onclick="document.getElementById('leave-modal').classList.add('hidden')" class="text-white hover:text-gray-200 outline-none"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6">
                <div class="bg-purple-50 p-3 rounded mb-4 text-xs text-purple-800 border border-purple-100">
                    💡 請假申請送出後，系統將自動通知導師與風紀股長。
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">假別</label>
                    <select id="leave-type" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-purple-500 outline-none">
                        <option value="病假">病假</option>
                        <option value="事假">事假</option>
                        <option value="喪假">喪假</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-1">事由 / 備註</label>
                    <input type="text" id="leave-reason" placeholder="例如：發燒、家中有事" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <button id="btn-submit-leave" onclick="submitLeave()" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg shadow hover:bg-purple-700 transition">確認送出申請</button>
            </div>
        </div>
    </div>

    <div id="change-pwd-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all">
            <div class="bg-indigo-600 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fas fa-user-lock mr-2"></i>更改家長密碼</h3>
                <button onclick="document.getElementById('change-pwd-modal').classList.add('hidden')" class="text-white hover:text-gray-200 outline-none"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">請輸入「舊」密碼</label>
                    <input type="password" id="self-old-pwd" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="驗證您的身分">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">請輸入「新」密碼</label>
                    <input type="password" id="self-new-pwd" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="支援 0 開頭">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-1">再次確認「新」密碼</label>
                    <input type="password" id="self-new-pwd-confirm" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="請再輸入一次">
                </div>
                <button id="btn-submit-change-pwd" onclick="submitChangePassword()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg shadow hover:bg-indigo-700 transition">確認更改</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwunBwJT2u3gpAcnibQW4RBOQhuzQXLtcirT4_6G6fG9FgwJjTAApax5fU0VZ1dNvdRog/exec";
        
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const userRole = sessionStorage.getItem('userRole');
        const stuId = sessionStorage.getItem('studentId');
        const stuName = sessionStorage.getItem('studentName');
        const stuClass = sessionStorage.getItem('studentClass');
        const loginUsername = sessionStorage.getItem('username') || ''; // 🟢 抓取家長登入的帳號

        if (!isLoggedIn || userRole !== 'parent') { 
            alert('請先以家長身分登入！'); 
            window.location.href = 'login.html'; 
        }

        let myChart = null;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('display-name').innerText = stuName;
            document.getElementById('display-class').innerText = `${stuClass}班 | 學號: ${stuId}`;
            
            const dateInput = document.getElementById('work-date');
            const today = new Date(); 
            dateInput.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            dateInput.addEventListener('change', () => { 
                fetchDailyReport(); 
                fetchWeeklyReport(); 
            });
            
            fetchDailyReport();
            fetchWeeklyReport();
        });

        // 🟢 更改密碼邏輯
        function openChangePwdModal() {
            document.getElementById('self-old-pwd').value = '';
            document.getElementById('self-new-pwd').value = '';
            document.getElementById('self-new-pwd-confirm').value = '';
            document.getElementById('change-pwd-modal').classList.remove('hidden');
        }

        async function submitChangePassword() {
            const oldPwd = document.getElementById('self-old-pwd').value;
            const newPwd = document.getElementById('self-new-pwd').value;
            const confirmPwd = document.getElementById('self-new-pwd-confirm').value;

            if (!oldPwd || !newPwd || !confirmPwd) return alert("所有欄位皆必填！");
            if (newPwd !== confirmPwd) return alert("兩次輸入的新密碼不一致！");
            if (newPwd.length < 4) return alert("新密碼長度至少需要 4 碼！");
            if (!loginUsername) return alert("登入狀態異常，無法更改密碼。");

            const btn = document.getElementById('btn-submit-change-pwd');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>處理中...';
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'changeUserPassword', username: loginUsername, oldPassword: oldPwd, newPassword: newPwd }) 
                });
                const result = await response.json();
                alert(result.message);
                if (result.success) {
                    document.getElementById('change-pwd-modal').classList.add('hidden');
                }
            } catch(e) {
                alert("網路連線異常，請稍後再試。");
            } finally {
                btn.innerHTML = '確認更改';
                btn.disabled = false;
            }
        }

        async function submitLeave() {
            const dateStr = document.getElementById('work-date').value;
            const leaveType = document.getElementById('leave-type').value;
            const reason = document.getElementById('leave-reason').value.trim();
            const btn = document.getElementById('btn-submit-leave');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>傳送中...'; 
            btn.disabled = true;
            
            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'submitLeave', date: dateStr, stuClass: stuClass, stuId: stuId, stuName: stuName, leaveType: leaveType, reason: reason }) 
                });
                const result = await response.json();
                if (result.success) {
                    alert('✅ 假單已成功送出！');
                    document.getElementById('leave-modal').classList.add('hidden');
                    document.getElementById('leave-reason').value = '';
                    fetchDailyReport(); // 重整畫面
                } else {
                    alert('送出失敗：' + result.message);
                }
            } catch (e) {
                alert('網路連線異常');
            } finally {
                btn.innerHTML = '確認送出申請'; 
                btn.disabled = false;
            }
        }

        async function fetchDailyReport() {
            const date = document.getElementById('work-date').value;
            const loadingMsg = document.getElementById('loading-msg');
            const content = document.getElementById('report-content');
            
            loadingMsg.classList.remove('hidden');
            content.classList.add('hidden');
            
            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getDailyReport', studentId: stuId, date: date }) 
                });
                const result = await response.json();
                if (result.success) {
                    renderReport(result);
                    content.classList.remove('hidden');
                } else {
                    alert('資料獲取失敗：' + result.message);
                }
            } catch (e) {
                alert('網路連線異常，無法讀取今日報表。');
            } finally {
                loadingMsg.classList.add('hidden');
            }
        }

        function renderReport(data) {
            // 1. 渲染聯絡簿
            const annSection = document.getElementById('announcement-section');
            if (data.announcement && (data.announcement.content || data.announcement.fileUrl)) {
                let attachmentHtml = '';
                if (data.announcement.fileUrl) {
                    let fileIdMatch = data.announcement.fileUrl.match(/[-\w]{25,}/);
                    let fileId = fileIdMatch ? fileIdMatch[0] : '';
                    let imgTag = fileId ? `<div class="mt-3 text-center"><img src="https://drive.google.com/thumbnail?id=${fileId}&sz=w800" class="max-w-full rounded-lg shadow-sm border border-purple-200 mx-auto" onerror="this.style.display='none';"></div>` : '';
                    
                    attachmentHtml = `
                        <div class="mt-2 pt-3 border-t border-purple-100">
                            <p class="text-sm font-bold text-purple-800 mb-2"><i class="fas fa-paperclip mr-1"></i>黑板/附件：<a href="${data.announcement.fileUrl}" target="_blank" class="text-blue-600 underline hover:text-blue-800">點此開啟</a></p>
                            ${imgTag}
                        </div>`;
                }
                
                annSection.innerHTML = `
                    <div class="bg-white rounded-xl shadow-sm border-t-4 border-purple-500 p-5 mb-6">
                        <h4 class="font-bold text-purple-700 mb-3 flex items-center border-b border-gray-100 pb-2"><i class="fas fa-bullhorn mr-2"></i>今日班級聯絡簿</h4>
                        <p class="text-gray-700 whitespace-pre-wrap text-sm leading-relaxed mb-3">${data.announcement.content}</p>
                        ${attachmentHtml}
                    </div>`;
            } else {
                annSection.innerHTML = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-6 text-center text-gray-400">
                        <i class="fas fa-comment-slash text-2xl mb-2 text-gray-300 block"></i>導師尚無發布聯絡簿
                    </div>`;
            }

            // 2. 出缺席與請假
            const attList = document.getElementById('attendance-list');
            if (data.leave) {
                attList.innerHTML = `
                    <div class="py-4 text-center">
                        <div class="inline-block bg-blue-50 text-blue-600 px-4 py-2 rounded-lg border border-blue-200">
                            <span class="font-bold block mb-1 text-base"><i class="fas fa-bed mr-2"></i>今日已請假 (${data.leave.type})</span>
                            <span class="text-xs text-gray-500 block">事由：${data.leave.reason}</span>
                        </div>
                    </div>`;
            } else if (data.attendance.length === 0) {
                attList.innerHTML = '<div class="py-4 text-center text-gray-400"><i class="fas fa-check-circle text-green-400 text-xl block mb-1"></i>今日出缺席皆正常</div>';
            } else {
                let html = '';
                data.attendance.forEach(item => {
                    if (item.attendance === 'present') return; 
                    let badge = item.attendance === 'absent' ? '<span class="bg-red-100 text-red-600 px-2 py-0.5 rounded text-xs font-bold border border-red-200">缺席</span>' : '<span class="bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded text-xs font-bold border border-yellow-200">遲到</span>';
                    html += `<div class="py-2.5 flex justify-between items-center"><span class="font-bold text-gray-700">${item.course}</span><div class="flex items-center gap-2">${item.comment ? '<span class="text-xs text-gray-400">'+item.comment+'</span>':''}${badge}</div></div>`;
                });
                attList.innerHTML = html || '<div class="py-4 text-center text-gray-400"><i class="fas fa-check-circle text-green-400 text-xl block mb-1"></i>今日出缺席皆正常</div>';
            }

            // 3. 作業繳交
            const subList = document.getElementById('submission-list');
            if (data.submissions.length === 0) {
                subList.innerHTML = '<div class="py-4 text-center text-gray-400"><i class="fas fa-clipboard-check text-green-400 text-xl block mb-1"></i>無欠交作業</div>';
            } else {
                let html = '';
                data.submissions.forEach(item => {
                    let badge = '';
                    if (item.status === 'missing') badge = '<span class="bg-red-100 text-red-600 px-2 py-0.5 rounded text-xs font-bold border border-red-200">缺交</span>';
                    else if (item.status === 'none') badge = '<span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs font-bold border border-gray-200">未帶</span>';
                    else if (item.status === 'leave') badge = '<span class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded text-xs font-bold border border-blue-200">請假</span>';
                    else badge = '<span class="bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded text-xs font-bold border border-yellow-200">未交</span>';
                    
                    let dateInfo = item.date !== document.getElementById('work-date').value ? `<div class="text-[10px] text-gray-400 mt-0.5">自 ${item.date} 欠交</div>` : '';
                    html += `<div class="py-2.5 flex justify-between items-center"><div><span class="font-bold text-gray-700">${item.itemName}</span>${dateInfo}</div>${badge}</div>`;
                });
                subList.innerHTML = html;
            }

            // 4. 考試成績
            const scoreList = document.getElementById('score-list');
            if (data.scores.length === 0) {
                scoreList.innerHTML = '<div class="py-4 text-center text-gray-400"><i class="fas fa-file-signature text-gray-300 text-xl block mb-1"></i>今日無登記成績</div>';
            } else {
                let html = '';
                data.scores.forEach(item => {
                    let sColor = 'text-gray-700';
                    let sVal = parseFloat(item.score);
                    if(!isNaN(sVal)) { if(sVal<60) sColor='text-red-500 font-bold'; else if(sVal>=90) sColor='text-green-600 font-bold'; }
                    html += `<div class="py-2.5 flex flex-col"><div class="flex justify-between items-center"><span class="font-bold text-gray-700">${item.course}</span><span class="${sColor}">${item.score} 分</span></div><span class="text-xs text-gray-500 mt-1">${item.examName}</span></div>`;
                });
                scoreList.innerHTML = html;
            }
        }

        async function fetchWeeklyReport() {
            const date = document.getElementById('work-date').value;
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getWeeklyReport', studentId: stuId, date: date }) });
                const result = await response.json();
                if (result.success) renderChart(result.labels, result.data);
            } catch (e) { console.error('無法載入成績趨勢圖'); }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: '日平均成績', data: data, borderColor: 'rgb(99, 102, 241)', backgroundColor: 'rgba(99, 102, 241, 0.1)', borderWidth: 2, pointBackgroundColor: 'rgb(99, 102, 241)', pointRadius: 4, fill: true, tension: 0.3, spanGaps: true }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100, ticks: { stepSize: 20 } }, x: { grid: { display: false } } } }
            });
        }

        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
