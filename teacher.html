<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老師控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden font-sans">

    <aside class="w-64 bg-gray-800 text-white flex flex-col hidden md:flex">
        <div class="p-6 border-b border-gray-700 text-center">
            <h2 class="text-xl font-bold text-blue-400">系統管理</h2>
            <p id="teacher-name-display" class="text-xs text-gray-400 mt-1"></p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" onclick="switchMode('attendance')" class="block px-4 py-2 hover:bg-gray-700 rounded">點名與成績</a>
            <a id="nav-weekly" href="#" onclick="switchMode('weekly')" class="hidden block px-4 py-2 hover:bg-gray-700 rounded text-teal-400 font-bold border-l-4 border-teal-500">週考報表</a>
        </nav>
        <button onclick="logout()" class="m-4 py-2 border border-red-500 text-red-500 rounded hover:bg-red-500 hover:text-white transition">登出</button>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            
            <div class="flex gap-2 mb-6 bg-gray-200 p-1 rounded-lg">
                <button id="tab-attendance" onclick="switchMode('attendance')" class="flex-1 py-2 rounded bg-white shadow font-bold">一般管理</button>
                <button id="tab-weekly" onclick="switchMode('weekly')" class="hidden flex-1 py-2 rounded font-bold text-gray-500">👑 週考成績</button>
            </div>

            <div id="weekly-filter" class="hidden bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div class="md:col-span-1"><label class="block text-sm font-bold text-gray-700 mb-1">週考名稱</label><input type="text" id="wk-name" value="第一週週考" class="w-full border rounded p-2"></div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">起始日期</label><input type="date" id="wk-start" class="w-full border rounded p-2"></div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">結束日期</label><input type="date" id="wk-end" class="w-full border rounded p-2"></div>
                    <button onclick="generateWeeklyReport()" class="bg-indigo-600 text-white font-bold py-2 rounded hover:bg-indigo-700 transition shadow">產生週考報表</button>
                </div>
            </div>

            <div id="filter-container" class="bg-white p-6 rounded-xl shadow-sm border mb-6">...</div>

            <div id="weekly-table-container" class="hidden bg-white rounded-xl shadow-sm border overflow-hidden">
                <div class="bg-indigo-50 p-4 border-b flex justify-between items-center">
                    <h3 id="wk-title-display" class="font-bold text-indigo-800"></h3>
                    <button onclick="exportWeeklyCSV()" class="text-xs bg-white border px-3 py-1 rounded shadow">匯出 CSV</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-center border-collapse">
                        <thead id="weekly-thead" class="bg-gray-50 text-gray-600 text-xs font-bold border-b"></thead>
                        <tbody id="weekly-tbody" class="divide-y text-sm"></tbody>
                    </table>
                </div>
            </div>

            <div id="table-container" class="bg-white rounded-xl shadow border">...</div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwunBwJT2u3gpAcnibQW4RBOQhuzQXLtcirT4_6G6fG9FgwJjTAApax5fU0VZ1dNvdRog/exec";
        const homeroomClass = sessionStorage.getItem('homeroom') || '';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('teacher-name-display').innerText = sessionStorage.getItem('username') + (homeroomClass ? ` (${homeroomClass}導師)` : '');
            if (homeroomClass) {
                document.getElementById('tab-weekly').classList.remove('hidden');
                document.getElementById('nav-weekly').classList.remove('hidden');
            }
        });

        function switchMode(mode) {
            const isWeekly = (mode === 'weekly');
            document.getElementById('weekly-filter').classList.toggle('hidden', !isWeekly);
            document.getElementById('weekly-table-container').classList.toggle('hidden', !isWeekly);
            document.getElementById('filter-container').classList.toggle('hidden', isWeekly);
            document.getElementById('table-container').classList.toggle('hidden', isWeekly);
            
            // 頁籤樣式切換
            document.getElementById('tab-weekly').className = isWeekly ? "flex-1 py-2 rounded bg-white shadow font-bold text-indigo-600" : "flex-1 py-2 rounded font-bold text-gray-500";
            document.getElementById('tab-attendance').className = !isWeekly ? "flex-1 py-2 rounded bg-white shadow font-bold text-blue-600" : "flex-1 py-2 rounded font-bold text-gray-500";
        }

        async function generateWeeklyReport() {
            const start = document.getElementById('wk-start').value;
            const end = document.getElementById('wk-end').value;
            const wkName = document.getElementById('wk-name').value;
            if (!start || !end) return alert("請選擇日期區間！");

            const tbody = document.getElementById('weekly-tbody');
            tbody.innerHTML = '<tr><td colspan="20" class="py-10 text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>資料結算中，請稍候...</td></tr>';

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'loadWeeklyReport', homeroomClass, startDate: start, endDate: end }) 
                });
                const result = await res.json();
                if (result.success) renderWeekly(result, wkName);
                else alert(result.message);
            } catch (e) { alert("連線錯誤"); }
        }

        function renderWeekly(result, wkName) {
            document.getElementById('wk-title-display').innerText = `${wkName} (${result.exams.length} 次考試彙整)`;
            const thead = document.getElementById('weekly-thead');
            const tbody = document.getElementById('weekly-tbody');
            
            // 建立表頭
            let headHtml = `<tr><th class="p-3">學號</th><th class="p-3">姓名</th>`;
            result.exams.forEach(ex => {
                headHtml += `<th class="p-3 border-l">${ex.replace('-', '<br>')}</th>`;
            });
            headHtml += `<th class="p-3 border-l bg-indigo-50">總分</th><th class="p-3 bg-indigo-50">平均</th><th class="p-3 bg-indigo-50">名次</th></tr>`;
            thead.innerHTML = headHtml;

            // 建立內容
            let bodyHtml = '';
            result.data.forEach(st => {
                bodyHtml += `<tr class="hover:bg-gray-50"><td class="p-3 font-mono">${st.studentId}</td><td class="p-3 font-bold">${st.name}</td>`;
                result.exams.forEach(ex => {
                    let s = st.scores[ex];
                    let scoreText = s !== undefined ? s : '<span class="text-red-400">0</span>';
                    bodyHtml += `<td class="p-3 border-l text-gray-500">${scoreText}</td>`;
                });
                bodyHtml += `<td class="p-3 border-l font-bold text-indigo-700 bg-indigo-50/30">${st.total}</td>`;
                bodyHtml += `<td class="p-3 font-bold text-indigo-700 bg-indigo-50/30">${st.avg}</td>`;
                bodyHtml += `<td class="p-3 font-black text-orange-600 bg-orange-50/30">${st.rank}</td></tr>`;
            });
            tbody.innerHTML = bodyHtml;
        }

        function exportWeeklyCSV() {
            // ... 同原本 exportCSV 邏輯，抓取 weekly-table 內容即可 ...
        }

        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
