<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老師控制台 - 上課與成績登記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        input:disabled, select:disabled { background-color: transparent; border-color: transparent; color: #374151; cursor: default; appearance: none; }
        input:disabled:focus, select:disabled:focus { outline: none; box-shadow: none; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden font-sans relative">

    <header class="md:hidden bg-gray-800 text-white p-4 flex justify-between items-center shadow-md w-full absolute top-0 z-40">
        <h1 class="text-lg font-bold text-blue-400">系統管理 - 老師端</h1>
        <div>
            <button onclick="openChangePwdModal()" class="text-blue-300 hover:text-white text-sm mr-3 transition"><i class="fas fa-key"></i> 密碼</button>
            <button onclick="logout()" class="text-red-400 hover:text-white text-sm border border-red-400 px-3 py-1 rounded"><i class="fas fa-sign-out-alt"></i> 登出</button>
        </div>
    </header>

    <aside class="w-64 bg-gray-800 text-white flex flex-col hidden md:flex z-40">
        <div class="p-6 text-center border-b border-gray-700">
            <h2 class="text-2xl font-bold text-blue-400">系統管理</h2>
            <p id="teacher-name-display" class="text-sm text-gray-400 mt-2">老師控制台</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="block px-4 py-2 bg-blue-600 rounded-lg text-white font-medium"><i class="fas fa-edit mr-2"></i> 登記狀況與成績</a>
            <a href="#" onclick="openChangePwdModal()" class="block px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg font-medium transition"><i class="fas fa-key mr-2"></i> 更改個人密碼</a>
        </nav>
        <div class="p-4 border-t border-gray-700">
            <button onclick="logout()" class="w-full py-2 text-sm text-red-400 border border-red-400 rounded hover:bg-red-400 hover:text-white transition"><i class="fas fa-sign-out-alt mr-1"></i>登出</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden pt-16 md:pt-0">
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            
            <div class="flex flex-wrap gap-2 mb-6 bg-gray-200 rounded-lg p-1">
                <button id="tab-attendance" onclick="switchMode('attendance')" class="flex-1 min-w-[100px] py-2 text-center rounded-md bg-white shadow text-blue-600 font-bold transition-all"><i class="fas fa-user-check mr-1"></i> 出缺席/評語</button>
                <button id="tab-score" onclick="switchMode('score')" class="flex-1 min-w-[100px] py-2 text-center rounded-md text-gray-500 hover:text-gray-700 font-bold transition-all"><i class="fas fa-marker mr-1"></i> 考試成績</button>
                <button id="tab-submission" onclick="switchMode('submission')" class="flex-1 min-w-[100px] py-2 text-center rounded-md text-gray-500 hover:text-gray-700 font-bold transition-all"><i class="fas fa-clipboard-check mr-1"></i> 物品/作業</button>
                <button id="tab-announcement" onclick="switchMode('announcement')" class="flex-1 min-w-[100px] py-2 text-center rounded-md text-gray-500 hover:text-gray-700 font-bold transition-all"><i class="fas fa-bullhorn mr-1"></i> 聯絡簿</button>
                <button id="tab-homeroom" onclick="switchMode('homeroom')" class="hidden flex-1 min-w-[100px] py-2 text-center rounded-md text-gray-500 hover:text-gray-700 font-bold transition-all"><i class="fas fa-chart-pie text-yellow-500 mr-1"></i> 導師儀表板</button>
                <button id="tab-manage" onclick="switchMode('manage')" class="hidden flex-1 min-w-[100px] py-2 text-center rounded-md text-gray-500 hover:text-gray-700 font-bold transition-all"><i class="fas fa-cog text-purple-500 mr-1"></i> 班級設定</button>
            </div>

            <div id="filter-container" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">日期</label><input type="date" id="datePicker" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500"></div>
                    <div id="classContainer"><label class="block text-sm font-medium text-gray-700 mb-1">班級</label><select id="classSelect" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500"></select></div>
                    <div id="subjectContainer"><label class="block text-sm font-medium text-gray-700 mb-1">節次 / 科目</label><select id="subjectSelect" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500"><option value="">載入中...</option></select></div>
                    <div id="examNameContainer" class="hidden md:col-span-2">
                        <label id="examNameLabel" class="block text-sm font-bold text-blue-600 mb-1">名稱 (可輸入新名稱或點擊下方標籤)</label>
                        <input type="text" id="examNameInput" placeholder="例: 第一單元" class="w-full border-blue-300 border-2 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 mb-1">
                        <div id="existing-items-tags" class="flex flex-wrap gap-1.5 min-h-[24px] items-center"></div>
                    </div>
                    <div><button id="load-btn" onclick="executeLoad()" class="w-full bg-blue-600 text-white font-medium py-2 rounded-lg hover:bg-blue-700 transition shadow"><i class="fas fa-cloud-download-alt mr-1"></i> 載入資料</button></div>
                </div>
            </div>

            <div id="manage-container" class="hidden space-y-6"> <div class="flex items-center justify-between border-b pb-2"><h2 class="text-xl font-black text-gray-800"><i class="fas fa-users-cog mr-2"></i>本班專屬管理後台</h2><span class="bg-purple-100 text-purple-800 text-xs font-bold px-3 py-1 rounded-full"><i class="fas fa-shield-alt mr-1"></i>導師最高權限</span></div> <div class="grid grid-cols-1 lg:grid-cols-2 gap-6"> <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"><div class="bg-blue-50 p-4 border-b border-gray-200 flex justify-between items-center"><h3 class="font-bold text-blue-800"><i class="fas fa-user-graduate mr-2"></i>學生名單管理</h3><button onclick="openStudentModal('add')" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm font-bold shadow transition flex items-center"><i class="fas fa-plus mr-1"></i>新增學生</button></div><div class="p-4 max-h-[60vh] overflow-y-auto"><ul id="manage-student-list" class="divide-y divide-gray-100"><li class="text-center py-4 text-gray-400">載入中...</li></ul></div></div> <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"><div class="bg-purple-50 p-4 border-b border-gray-200 flex justify-between items-center"><h3 class="font-bold text-purple-800"><i class="fas fa-key mr-2"></i>家長與幹部帳號管理</h3><button onclick="loadManageData()" class="text-purple-600 hover:text-purple-800 text-sm font-bold"><i class="fas fa-sync-alt mr-1"></i>重新整理</button></div><div class="p-4 max-h-[60vh] overflow-y-auto"><ul id="manage-account-list" class="divide-y divide-gray-100"><li class="text-center py-4 text-gray-400">載入中...</li></ul></div></div> </div> </div>

            <div id="homeroom-container" class="hidden space-y-6">
                <div class="flex items-center justify-between border-b pb-2"><h2 class="text-xl font-black text-gray-800" id="homeroom-title">班級導師儀表板</h2><span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-3 py-1 rounded-full"><i class="fas fa-star mr-1"></i>導師專屬</span></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white rounded-xl shadow-sm border-t-4 border-red-500 p-5">
                        <h3 class="font-bold text-red-600 mb-4 text-base border-b border-gray-100 pb-2"><i class="fas fa-exclamation-triangle mr-2"></i>出缺席 & 課堂表現</h3>
                        <div id="hr-attendance-list" class="space-y-3 text-sm max-h-[40vh] overflow-y-auto">請點擊上方「載入資料」</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border-t-4 border-yellow-500 p-5">
                        <h3 class="font-bold text-yellow-600 mb-4 text-base border-b border-gray-100 pb-2"><i class="fas fa-clipboard-list mr-2"></i>未交與待加強</h3>
                        <div id="hr-submission-list" class="space-y-3 text-sm max-h-[40vh] overflow-y-auto">請點擊上方「載入資料」</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border-t-4 border-blue-500 p-5">
                        <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-2">
                            <h3 class="font-bold text-blue-600 text-base"><i class="fas fa-bed mr-2"></i>今日請假單</h3>
                            <button onclick="openProxyLeaveModal()" class="text-blue-600 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded text-xs font-bold border border-blue-200 shadow-sm transition"><i class="fas fa-plus mr-1"></i>代填請假</button>
                        </div>
                        <div id="hr-leave-list" class="space-y-3 text-sm max-h-[40vh] overflow-y-auto">請點擊上方「載入資料」</div>
                    </div>
                </div>
            </div>

            <div id="bulletin-container" class="hidden bg-white p-6 rounded-xl shadow-sm border border-gray-200 mt-2"> <h3 class="text-lg font-bold text-gray-800 mb-4"><i class="fas fa-bullhorn text-blue-500 mr-2"></i>發布班級聯絡簿 / 佈告</h3> <textarea id="bulletin-content" rows="6" class="w-full border-gray-300 border rounded-lg p-3 focus:ring-2 focus:ring-blue-500" placeholder="請輸入今日要提醒家長或學生的事項..."></textarea> <div class="mt-4 bg-gray-50 p-3 rounded-lg border border-gray-200"> <label class="block text-sm font-bold text-gray-700 mb-2"><i class="fas fa-paperclip mr-1"></i>附加檔案 (照片或講義，上限 5MB)</label> <input type="file" id="bulletin-file" accept="image/*,.pdf" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer"> <div id="bulletin-file-link" class="mt-2 text-sm"></div> </div> <div class="mt-4 flex justify-end"><button id="save-bulletin-btn" onclick="saveBulletin()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow transition"><i class="fas fa-paper-plane mr-2"></i> 發布 / 更新公告</button></div> </div>
            <div id="table-container" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"> 
                <div class="bg-blue-50 p-4 border-b border-gray-200 flex justify-between items-center"> <div id="stats-dashboard" class="text-blue-800 font-bold text-sm">請先載入名單</div> <button onclick="exportCSV()" class="bg-white border border-blue-300 text-blue-600 hover:bg-blue-100 font-bold py-1 px-3 rounded shadow-sm text-sm transition"><i class="fas fa-file-csv mr-1"></i> 匯出 CSV</button> </div> 
                <div id="readonly-warning" class="hidden bg-red-50 text-red-600 p-3 text-sm font-bold border-b border-red-100 flex items-center justify-center"> <i class="fas fa-lock mr-2"></i> 此任務由 <span id="task-creator-name" class="mx-1 underline"></span> 建立，您僅有檢視權限。 </div> 
                <div id="batch-assign-container" class="hidden bg-indigo-50 p-4 border-b border-indigo-100 flex flex-col sm:flex-row items-center justify-between gap-4"> <div class="flex-1 w-full"><label class="block text-xs font-bold text-indigo-700 mb-1"><i class="fas fa-magic mr-1"></i> 快速指派特定學生 (輸入座號，例: 1,3,5 或 1-5)</label><input type="text" id="batch-assign-input" placeholder="留空代表全班皆須繳交" class="w-full bg-white border border-indigo-200 rounded px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400"></div> <button onclick="applyBatchAssign()" class="bg-indigo-600 text-white px-5 py-2 mt-4 sm:mt-0 rounded-lg shadow-sm text-sm font-bold hover:bg-indigo-700 transition">快速套用</button> </div> 
                <div class="overflow-x-auto"> <table class="w-full text-left border-collapse min-w-max"><thead class="bg-gray-50 border-b border-gray-200" id="tableHeader"></thead><tbody id="studentTableBody" class="divide-y divide-gray-100"><tr><td colspan="6" class="text-center py-8 text-gray-400">請載入資料</td></tr></tbody></table> </div> 
                <div id="bottom-action-bar" class="bg-gray-50 p-4 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4 hidden"> <div class="flex gap-2 w-full sm:w-auto"> <button id="quick-fill-btn" onclick="quickFill()" class="bg-blue-100 text-blue-700 hover:bg-blue-200 font-bold py-2 px-4 rounded-lg shadow-sm transition hidden flex-1 sm:flex-none"><i class="fas fa-check-circle mr-1"></i> 一鍵全班正常</button> <button id="quick-done-btn" onclick="quickDone()" class="bg-green-100 text-green-700 hover:bg-green-200 font-bold py-2 px-4 rounded-lg shadow-sm transition hidden flex-1 sm:flex-none"><i class="fas fa-check-double mr-1"></i> 一鍵全班已交</button> </div> <button id="batch-save-btn" onclick="batchSave()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow transition flex items-center hidden w-full sm:w-auto justify-center"><i class="fas fa-bolt mr-2"></i> 極速一鍵儲存</button> </div> 
            </div>
        </div>
    </main>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4"> <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all"><div id="modal-header" class="bg-blue-600 p-4 text-white flex justify-between items-center"><h3 class="font-bold text-lg" id="modal-title">標題</h3><button onclick="closeAdminModal()" class="text-white hover:text-gray-200 outline-none"><i class="fas fa-times text-xl"></i></button></div><div class="p-6" id="modal-body"></div></div> </div>
    <div id="leave-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4"> <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all"> <div class="bg-blue-600 p-4 text-white flex justify-between items-center"> <h3 class="font-bold text-lg"><i class="fas fa-clipboard-list mr-2"></i>登記請假 / 早退</h3> <button onclick="document.getElementById('leave-modal').classList.add('hidden')" class="text-white hover:text-gray-200 outline-none"><i class="fas fa-times text-xl"></i></button> </div> <div class="p-6"> <div class="bg-blue-50 p-3 rounded mb-4 text-xs text-blue-800 border border-blue-100"> 💡 登記後，該學生今日在所有點名表中將自動預設為「請假」。 </div> <div class="mb-4"> <label class="block text-sm font-bold text-gray-700 mb-1">選擇學生</label> <select id="leave-stu-select" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"> <option value="">載入中...</option> </select> </div> <div class="mb-4"> <label class="block text-sm font-bold text-gray-700 mb-1">假別</label> <select id="leave-type" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"> <option value="病假">病假</option> <option value="事假">事假</option> <option value="公假">公假</option> <option value="喪假">喪假</option> <option value="早退">早退 (中途離校)</option> </select> </div> <div class="mb-6"> <label class="block text-sm font-bold text-gray-700 mb-1">事由 / 備註</label> <input type="text" id="leave-reason" placeholder="例如：發燒 / 第四節後離校" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"> </div> <button id="btn-submit-leave" onclick="submitProxyLeave()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 transition">確認送出</button> </div> </div> </div>
    <div id="change-pwd-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4"> <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all"> <div class="bg-gray-800 p-4 text-white flex justify-between items-center"> <h3 class="font-bold text-lg"><i class="fas fa-user-lock mr-2"></i>更改個人密碼</h3> <button onclick="document.getElementById('change-pwd-modal').classList.add('hidden')" class="text-white hover:text-gray-300 outline-none"><i class="fas fa-times text-xl"></i></button> </div> <div class="p-6"> <div class="mb-4"> <label class="block text-sm font-bold text-gray-700 mb-1">請輸入「舊」密碼</label> <input type="password" id="self-old-pwd" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="驗證您的身分"> </div> <div class="mb-4"> <label class="block text-sm font-bold text-gray-700 mb-1">請輸入「新」密碼</label> <input type="password" id="self-new-pwd" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="支援 0 開頭"> </div> <div class="mb-6"> <label class="block text-sm font-bold text-gray-700 mb-1">再次確認「新」密碼</label> <input type="password" id="self-new-pwd-confirm" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="請再輸入一次"> </div> <button id="btn-submit-change-pwd" onclick="submitChangePassword()" class="w-full bg-gray-800 text-white font-bold py-3 rounded-lg shadow hover:bg-gray-900 transition">確認更改</button> </div> </div> </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwunBwJT2u3gpAcnibQW4RBOQhuzQXLtcirT4_6G6fG9FgwJjTAApax5fU0VZ1dNvdRog/exec";
        if (!sessionStorage.getItem('isLoggedIn') || sessionStorage.getItem('userRole') !== 'teacher') { alert('權限不足！'); window.location.href = 'login.html'; }

        let currentMode = 'attendance', studentData = [];
        const datePicker = document.getElementById('datePicker'), classSelect = document.getElementById('classSelect'), subjectSelect = document.getElementById('subjectSelect'), examNameInput = document.getElementById('examNameInput');
        const homeroomClass = sessionStorage.getItem('homeroom') || '';
        const myCreatorName = sessionStorage.getItem('username') || ''; 
        const loginUsername = sessionStorage.getItem('username') || ''; 

        document.addEventListener('DOMContentLoaded', () => {
            datePicker.valueAsDate = new Date();
            let titleText = myCreatorName + " 老師";
            if (homeroomClass) titleText += ` (👑 ${homeroomClass}班導師)`;
            document.getElementById('teacher-name-display').innerText = titleText;

            JSON.parse(sessionStorage.getItem('teacherClasses') || "[]").forEach(c => classSelect.add(new Option(c, c)));

            if (homeroomClass) {
                document.getElementById('tab-homeroom').classList.remove('hidden');
                document.getElementById('tab-manage').classList.remove('hidden');
                document.getElementById('homeroom-title').innerText = `${homeroomClass}班 導師儀表板`;
                switchMode('homeroom'); 
            } else {
                fetchSubjectSchedule();
            }
        });

        // 🟢 導師儀表板顯示：加入紅色通報警戒框
        function renderHomeroom(data) { 
            const attList = document.getElementById('hr-attendance-list'); 
            if (!data.abnormalAttendance || data.abnormalAttendance.length === 0) { 
                attList.innerHTML = '<div class="bg-green-50 text-green-600 p-4 rounded-lg text-center font-bold border border-green-200"><i class="fas fa-check-circle text-2xl mb-1 block"></i>全班皆正常出席且無評語</div>'; 
            } else { 
                let html = ''; 
                data.abnormalAttendance.forEach(a => { 
                    let badge = '';
                    if (a.status === 'absent') badge = '<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold shadow-sm border border-red-200">缺席</span>';
                    else if (a.status === 'late') badge = '<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs font-bold shadow-sm border border-yellow-200">遲到</span>';
                    else if (a.status === 'leave') badge = '<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold shadow-sm border border-blue-200">請假</span>';
                    else badge = '<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold shadow-sm border border-green-200">正常</span>';
                    
                    let commentHtml = '';
                    if (a.comment) {
                        let isFlagged = a.comment.includes('[❗通報]');
                        let cleanComment = a.comment.replace('[❗通報] ', '').replace('[❗通報]', '').trim();
                        
                        if (isFlagged) {
                            // ❗ 紅色警戒通報框
                            commentHtml = `<div class="mt-2.5 text-sm text-red-800 bg-red-50 p-3 rounded-lg border border-red-200 shadow-sm"><i class="fas fa-exclamation-circle text-red-600 mr-2"></i><span class="font-black text-red-700">特別通報：</span>${cleanComment || '無文字，僅標記通報'}</div>`;
                        } else if (cleanComment) {
                            // 💡 靛藍色一般評語框
                            commentHtml = `<div class="mt-2.5 text-sm text-indigo-800 bg-indigo-50 p-3 rounded-lg border border-indigo-100 shadow-sm"><i class="fas fa-comment-dots text-indigo-500 mr-2"></i><span class="font-black text-indigo-700">評語：</span>${cleanComment}</div>`;
                        }
                    }

                    html += `<div class="border-b border-gray-100 pb-4 mb-4 last:border-0 last:mb-0 last:pb-0"> 
                                <div class="flex justify-between items-center"> 
                                    <div class="font-bold text-gray-700"><span class="text-gray-400 mr-2 text-xs">${a.studentId}</span>${a.name} <span class="text-gray-400 text-xs ml-1 bg-gray-50 px-1 rounded">${a.subject}</span></div> 
                                    ${badge} 
                                </div> 
                                ${commentHtml}
                             </div>`; 
                }); 
                attList.innerHTML = html; 
            } 
            
            const subList = document.getElementById('hr-submission-list'); 
            if (!data.missingSubmissions || data.missingSubmissions.length === 0) { subList.innerHTML = '<div class="bg-green-50 text-green-600 p-4 rounded-lg text-center font-bold border border-green-200"><i class="fas fa-clipboard-check text-2xl mb-1 block"></i>尚無任何未交項目</div>'; }

ule.length > 0) { const optGroup1 = document.createElement('optgroup'); optGroup1.label = "📋 當日課表 (連動風紀點名)"; result.schedule.forEach(item => { let disp = item.subject ? `${item.period} - ${item.subject}` : item.period; optGroup1.appendChild(new Option(disp, disp)); }); subjectSelect.appendChild(optGroup1); } else subjectSelect.add(new Option("今日無預設課表", "")); const teacherSubjs = JSON.parse(sessionStorage.getItem('teacherSubjects') || "[]"); if (teacherSubjs.length > 0) { const optGroup2 = document.createElement('optgroup'); optGroup2.label = "💡 我的任教科目 (無節次)"; teacherSubjs.forEach(s => optGroup2.appendChild(new Option(s, s))); subjectSelect.appendChild(optGroup2); } } catch (e) { subjectSelect.innerHTML = '<option value="">課表載入失敗</option>'; } finally { subjectSelect.disabled = false; if (currentMode === 'score') fetchExistingItems(); } } [datePicker, classSelect].forEach(input => { input.addEventListener('change', () => { resetTableState(); if (currentMode === 'homeroom') loadHomeroomOverview(); else if (currentMode === 'manage') loadManageData(); else if (currentMode !== 'submission') fetchSubjectSchedule(); if (currentMode === 'announcement') loadBulletin(); if (currentMode === 'submission' || currentMode === 'score') fetchExistingItems(); }); }); [subjectSelect].forEach(input => { input.addEventListener('change', () => { resetTableState(); if (input === subjectSelect && currentMode === 'score') fetchExistingItems(); }); }); examNameInput.addEventListener('input', () => { resetTableState(); }); function resetTableState() { studentData = []; document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="6" class="text-center py-8 text-red-500 font-bold">⚠️ 查詢條件已變更，請重新點擊「載入資料」</td></tr>'; document.getElementById('bottom-action-bar').classList.add('hidden'); document.getElementById('readonly-warning').classList.add('hidden'); document.getElementById('stats-dashboard').innerText = "等待載入..."; document.getElementById('batch-assign-container').classList.add('hidden'); } window.addEventListener('beforeunload', function (e) { if (studentData.some(st => !st.isSaved)) { e.preventDefault(); e.returnValue = '未儲存離開？'; } }); async function fetchExistingItems() { if (!classSelect.value) return; const isSub = currentMode === 'submission'; if (!isSub && !subjectSelect.value) return; const tagsContainer = document.getElementById('existing-items-tags'); tagsContainer.innerHTML = '<span class="text-xs text-gray-400">查詢已有項目中...</span>'; try { const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: isSub ? 'getSubmissionItems' : 'getExamNames', date: datePicker.value, className: classSelect.value, subject: subjectSelect.value }) }); const result = await response.json(); if (result.success) { const list = isSub ? result.items.filter(item => item !== '手機繳交' && !item.includes('打掃') && !item.includes('聯絡簿')) : result.exams; if (list.length === 0) { tagsContainer.innerHTML = '<span class="text-xs text-gray-400"><i class="fas fa-info-circle mr-1"></i>今日尚無建立項目，請直接輸入新名稱</span>'; } else { let html = '<span class="text-xs text-gray-500 mr-1">今日已有項目：</span>'; list.forEach(item => { html += `<button onclick="selectExistingItem('${item}')" class="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-2 py-0.5 rounded text-xs font-bold transition shadow-sm">${item}</button>`; }); tagsContainer.innerHTML = html; } } } catch (e) { tagsContainer.innerHTML = '<span class="text-xs text-red-400">查詢失敗</span>'; } } function selectExistingItem(itemName) { document.getElementById('examNameInput').value = itemName; loadStudentList(); } function switchMode(mode) { currentMode = mode; resetTableState(); document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-400">請重新載入資料</td></tr>'; const tabs = ['attendance', 'score', 'submission', 'announcement', 'homeroom', 'manage']; const classContainer = document.getElementById('classContainer'), subjContainer = document.getElementById('subjectContainer'), examContainer = document.getElementById('examNameContainer'), filterContainer = document.getElementById('filter-container'); const tableContainer = document.getElementById('table-container'), bulletinContainer = document.getElementById('bulletin-container'), hrContainer = document.getElementById('homeroom-container'), manageContainer = document.getElementById('manage-container'); tabs.forEach(t => { let el = document.getElementById(`tab-${t}`); if(el) { if ((t === 'homeroom' || t === 'manage') && !homeroomClass) return; el.className = "flex-1 min-w-[100px] py-2 text-center rounded-md text-gray-500 hover:text-gray-700 font-bold transition-all"; } }); tableContainer.classList.add('hidden'); bulletinContainer.classList.add('hidden'); hrContainer.classList.add('hidden'); manageContainer.classList.add('hidden'); filterContainer.classList.remove('hidden'); let activeTab = document.getElementById(`tab-${mode}`); if(activeTab) activeTab.className = "flex-1 min-w-[100px] py-2 text-center rounded-md bg-white shadow text-blue-600 font-bold transition-all"; if (mode === 'homeroom') { classContainer.classList.add('hidden'); subjContainer.classList.add('hidden'); examContainer.classList.add('hidden'); hrContainer.classList.remove('hidden'); loadHomeroomOverview(); } else if (mode === 'manage') { filterContainer.classList.add('hidden'); manageContainer.classList.remove('hidden'); loadManageData(); } else if (mode === 'attendance') { classContainer.classList.remove('hidden'); subjContainer.classList.remove('hidden'); examContainer.classList.add('hidden'); tableContainer.classList.remove('hidden'); fetchSubjectSchedule(); } else if (mode === 'score') { classContainer.classList.remove('hidden'); subjContainer.classList.remove('hidden'); examContainer.classList.remove('hidden'); tableContainer.classList.remove('hidden'); document.getElementById('examNameLabel').innerText = '考試名稱 (可輸入新名稱或點擊下方標籤)'; examNameInput.placeholder = '例: 第一單元'; fetchSubjectSchedule(); } else if (mode === 'submission') { classContainer.classList.remove('hidden'); subjContainer.classList.add('hidden'); examContainer.classList.remove('hidden'); tableContainer.classList.remove('hidden'); document.getElementById('examNameLabel').innerText = '物品/作業名稱 (可輸入新名稱或點擊下方標籤)'; examNameInput.placeholder = '例: 國文學習單'; fetchExistingItems(); } else if (mode === 'announcement') { classContainer.classList.remove('hidden'); subjContainer.classList.add('hidden'); examContainer.classList.add('hidden'); bulletinContainer.classList.remove('hidden'); loadBulletin(); } renderTableHeader(); } function executeLoad() { if (currentMode === 'homeroom') loadHomeroomOverview(); else if (currentMode === 'announcement') loadBulletin(); else loadStudentList(); } function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); } async function loadManageData() { const listStu = document.getElementById('manage-student-list'); const listAcc = document.getElementById('manage-account-list'); listStu.innerHTML = '<li class="text-center py-4 text-blue-500"><i class="fas fa-spinner fa-spin mr-2"></i>載入中...</li>'; listAcc.innerHTML = '<li class="text-center py-4 text-purple-500"><i class="fas fa-spinner fa-spin mr-2"></i>載入中...</li>'; try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getHomeroomUsers', className: homeroomClass }) }); const result = await res.json(); if (result.success) { if(result.students.length === 0) listStu.innerHTML = '<li class="text-center py-4 text-gray-400">目前無學生資料</li>'; else { let sHtml = ''; result.students.forEach(st => { sHtml += `<li class="flex justify-between items-center py-3"> <div><span class="text-gray-400 font-mono text-sm mr-2 w-8 inline-block">${st.studentId}</span><span class="font-bold text-gray-800">${st.name}</span></div> <button onclick="openStudentModal('edit', '${st.studentId}', '${st.name}')" class="text-blue-500 hover:text-blue-700 bg-blue-50 px-2 py-1 rounded text-xs font-bold border border-blue-100 transition shadow-sm"><i class="fas fa-pen mr-1"></i>修改</button> </li>`; }); listStu.innerHTML = sHtml; } if(result.accounts.length === 0) listAcc.innerHTML = '<li class="text-center py-4 text-gray-400">目前無帳號資料</li>'; else { let aHtml = ''; result.accounts.forEach(acc => { let isParent = acc.role === '家長'; let roleColor = isParent ? 'bg-indigo-100 text-indigo-700' : 'bg-green-100 text-green-700'; let icon = isParent ? 'fa-user' : 'fa-shield-alt'; aHtml += `<li class="flex justify-between items-center py-3"> <div> <div class="font-bold text-gray-800">${acc.username} <span class="ml-2 text-[10px] font-bold ${roleColor} px-1.5 py-0.5 rounded border border-white"><i class="fas ${icon} mr-1"></i>${acc.role}</span></div> <div class="text-xs text-gray-500 mt-1">${acc.relatedInfo}</div> </div> <button onclick="openPasswordModal('${acc.username}')" class="text-purple-600 hover:text-white hover:bg-purple-600 bg-purple-50 px-3 py-1.5 rounded-lg text-xs font-bold border border-purple-200 transition shadow-sm"><i class="fas fa-key mr-1"></i>重設密碼</button> </li>`; }); listAcc.innerHTML = aHtml; } } else { listStu.innerHTML = `<li class="text-red-500 text-center py-4">讀取失敗</li>`; listAcc.innerHTML = `<li class="text-red-500 text-center py-4">讀取失敗</li>`; } } catch(e) { listStu.innerHTML = `<li class="text-red-500 text-center py-4">連線異常</li>`; listAcc.innerHTML = `<li class="text-red-500 text-center py-4">連線異常</li>`; } } function openStudentModal(mode, oldId = '', oldName = '') { const modal = document.getElementById('admin-modal'); document.getElementById('modal-header').className = 'bg-blue-600 p-4 text-white flex justify-between items-center'; document.getElementById('modal-title').innerHTML = mode === 'add' ? '<i class="fas fa-user-plus mr-2"></i>新增學生' : '<i class="fas fa-user-edit mr-2"></i>修改學生資料'; document.getElementById('modal-body').innerHTML = ` <div class="bg-blue-50 p-3 rounded mb-4 text-xs text-blue-800">💡 提示：請確保學號正確，這會影響家長登入與成績連動。</div> <div class="mb-4"> <label class="block text-sm font-bold text-gray-700 mb-1">學號 (登入用)</label> <input type="text" id="admin-stu-id" value="${oldId}" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"> </div> <div class="mb-6"> <label class="block text-sm font-bold text-gray-700 mb-1">學生姓名</label> <input type="text" id="admin-stu-name" value="${oldName}" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"> </div> <button id="admin-submit-btn" onclick="submitStudent('${mode}', '${oldId}')" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 transition">儲存資料</button> `; modal.classList.remove('hidden'); } async function submitStudent(mode, oldId) { const newId = document.getElementById('admin-stu-id').value.trim(); const newName = document.getElementById('admin-stu-name').value.trim(); if(!newId || !newName) return alert('學號與姓名不可空白！'); const btn = document.getElementById('admin-submit-btn'); btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>處理中...'; btn.disabled = true; try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStudentData', className: homeroomClass, oldStudentId: oldId, newStudentId: newId, newName: newName, mode: mode }) }); const result = await res.json(); alert(result.message); if(result.success) { closeAdminModal(); loadManageData(); } } catch(e) { alert('連線異常'); } finally { btn.innerHTML = '儲存資料'; btn.disabled = false; } } function openPasswordModal(username) { const modal = document.getElementById('admin-modal'); document.getElementById('modal-header').className = 'bg-purple-600 p-4 text-white flex justify-between items-center'; document.getElementById('modal-title').innerHTML = '<i class="fas fa-unlock-alt mr-2"></i>重設密碼'; document.getElementById('modal-body').innerHTML = ` <div class="bg-purple-50 p-3 rounded mb-4 text-sm text-purple-800 border border-purple-100"> 正在為帳號 <span class="font-black text-purple-900 bg-white px-2 py-0.5 rounded shadow-sm mx-1">${username}</span> 重設密碼。 </div> <div class="mb-6"> <label class="block text-sm font-bold text-gray-700 mb-1">請輸入新密碼</label> <input type="text" id="admin-new-pwd" placeholder="建議設定為家長手機號碼" class="w-full border-gray-300 border rounded-lg p-3 focus:ring-2 focus:ring-purple-500 outline-none"> </div> <button id="admin-pwd-btn" onclick="submitPassword('${username}')" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg shadow hover:bg-purple-700 transition">確認重設密碼</button> `; modal.classList.remove('hidden'); } async function submitPassword(username) { const newPwd = document.getElementById('admin-new-pwd').value.trim(); if(!newPwd) return alert('新密碼不可空白！'); const btn = document.getElementById('admin-pwd-btn'); btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>重設中...'; btn.disabled = true; try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'resetUserPassword', className: homeroomClass, username: username, newPassword: newPwd }) }); const result = await res.json(); alert(result.message); if(result.success) closeAdminModal(); } catch(e) { alert('連線異常'); } finally { btn.innerHTML = '確認重設密碼'; btn.disabled = false; } } function exportCSV() { if (studentData.length === 0) return alert('沒有資料可以匯出！'); let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; if (currentMode === 'attendance') { csvContent += "學號,姓名,狀態,評語\n"; studentData.forEach(st => csvContent += `${st.studentId},${st.name},${st.attendance === 'present' ? '正常' : (st.attendance === 'late' ? '遲到' : (st.attendance === 'absent' ? '缺席' : '請假'))},${st.comment || ''}\n`); } else if (currentMode === 'submission') { csvContent += "學號,姓名,狀態\n"; studentData.forEach(st => csvContent += `${st.studentId},${st.name},${st.status === 'done' ? '已交' : (st.status === 'exempt' ? '免交' : '未交')}\n`); } else { csvContent += "學號,姓名,考試成績\n"; studentData.forEach(st => csvContent += `${st.studentId},${st.name},${st.score || ''}\n`); } const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `匯出資料_${datePicker.value}_${classSelect.value}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link); } async function loadBulletin() { const btn = document.getElementById('load-btn'); btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`; btn.disabled = true; try { const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'loadAnnouncement', date: datePicker.value, className: classSelect.value }) }); const result = await response.json(); if(result.success) { document.getElementById('bulletin-content').value = result.content || ""; const linkDiv = document.getElementById('bulletin-file-link'); if(result.fileUrl) { let fileIdMatch = result.fileUrl.match(/[-\w]{25,}/); let fileId = fileIdMatch ? fileIdMatch[0] : ''; let imgTag = fileId ? `<div class="mt-3"><img src="https://drive.google.com/thumbnail?id=${fileId}&sz=w800" class="max-h-60 rounded-lg shadow-sm border border-gray-200" onerror="this.style.display='none';"></div>` : ''; linkDiv.innerHTML = `✅ 目前附件：<a href="${result.fileUrl}" target="_blank" class="text-blue-600 font-bold underline hover:text-blue-800">點此開啓原始檔案</a> <span class="text-xs text-gray-400 ml-2">(若重新上傳將會覆蓋)</span>${imgTag}`; } else { linkDiv.innerHTML = `<span class="text-gray-400">目前無附件</span>`; } } } catch(e) {} finally { btn.innerHTML = `<i class="fas fa-cloud-download-alt mr-1"></i> 載入資料`; btn.disabled = false; } } async function saveBulletin() { const content = document.getElementById('bulletin-content').value; const fileInput = document.getElementById('bulletin-file'); const file = fileInput.files[0]; if(!content.trim() && !file) return alert("請輸入聯絡簿內容，或是選擇上傳檔案！"); const btn = document.getElementById('save-bulletin-btn'); btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> 上傳與發布中...`; btn.disabled = true; let payload = { action: 'saveAnnouncement', date: datePicker.value, className: classSelect.value, content: content, teacherName: sessionStorage.getItem('username') }; if (file) { if (file.size > 5 * 1024 * 1024) { alert("檔案請勿超過 5MB！"); btn.innerHTML = `<i class="fas fa-paper-plane mr-2"></i> 發布 / 更新公告`; btn.disabled = false; return; } const reader = new FileReader(); reader.onload = async function(e) { payload.fileData = e.target.result.split(',')[1]; payload.fileName = file.name; payload.mimeType = file.type; await sendBulletinRequest(payload, btn); }; reader.readAsDataURL(file); } else { await sendBulletinRequest(payload, btn); } } async function sendBulletinRequest(payload, btn) { try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }); const result = await res.json(); if(result.success) { alert('🎉 發布成功！'); document.getElementById('bulletin-file').value = ''; loadBulletin(); } else alert('失敗：'+result.message); } catch(e){ alert("連線異常"); } finally { btn.innerHTML = `<i class="fas fa-paper-plane mr-2"></i> 發布 / 更新公告`; btn.disabled = false; } } function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
    </script>
