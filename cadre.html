<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幹部專區 - 班級管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans pb-12">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-md rounded-b-3xl pb-6">
        <div class="p-4 flex justify-between items-center">
            <h1 class="text-lg font-bold"><i class="fas fa-shield-alt mr-2"></i>幹部管理專區</h1>
            <div>
                <button onclick="openChangePwdModal()" class="text-blue-100 hover:text-white text-sm bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm transition mr-2"><i class="fas fa-key"></i> 密碼</button>
                <button onclick="logout()" class="text-blue-100 hover:text-white text-sm bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm transition"><i class="fas fa-sign-out-alt"></i> 登出</button>
            </div>
        </div>
        <div class="px-6 flex items-center mt-2">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-indigo-600 text-3xl font-bold border-4 border-indigo-300 shadow-sm">
                <i class="fas fa-user-shield"></i>
            </div>
            <div class="ml-4 flex-1">
                <p class="text-blue-100 text-sm mb-1"><span id="display-class" class="font-bold"></span> 班級幹部</p>
                <div class="flex items-center">
                    <h2 class="text-2xl font-bold mr-2" id="display-name">載入中...</h2>
                    <span id="display-title" class="bg-yellow-400 text-yellow-900 text-xs font-extrabold px-2 py-1 rounded-md shadow-sm">職稱</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">
        
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex justify-between items-center border border-gray-100">
            <h3 class="font-bold text-gray-700"><i class="far fa-calendar-alt text-blue-500 mr-2"></i>作業日期</h3>
            <input type="date" id="work-date" class="bg-gray-50 border border-gray-300 text-gray-800 text-sm rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
        </div>

        <div class="flex flex-wrap gap-2 mb-6" id="module-tabs">
            <button onclick="switchTab('common')" id="tab-common" class="flex-1 min-w-[45%] py-2.5 bg-blue-600 text-white rounded-xl shadow-md font-bold text-sm transition-all transform scale-105"><i class="fas fa-clipboard-check mr-1"></i> 物品繳交</button>
            <button onclick="switchTab('academic')" id="tab-academic" class="hidden flex-1 min-w-[45%] py-2.5 bg-white text-gray-500 hover:bg-gray-50 rounded-xl border border-gray-200 font-bold text-sm transition-all"><i class="fas fa-book-open mr-1"></i> 聯絡簿</button>
            <button onclick="switchTab('hygiene')" id="tab-hygiene" class="hidden flex-1 min-w-[45%] py-2.5 bg-white text-gray-500 hover:bg-gray-50 rounded-xl border border-gray-200 font-bold text-sm transition-all"><i class="fas fa-broom mr-1"></i> 打掃核實</button>
            <button onclick="switchTab('leader')" id="tab-leader" class="hidden flex-1 min-w-[45%] py-2.5 bg-white text-gray-500 hover:bg-gray-50 rounded-xl border border-gray-200 font-bold text-sm transition-all"><i class="fas fa-mobile-alt mr-1"></i> 手機繳交</button>
            <button onclick="switchTab('discipline')" id="tab-discipline" class="hidden flex-1 min-w-[45%] py-2.5 bg-white text-gray-500 hover:bg-gray-50 rounded-xl border border-gray-200 font-bold text-sm transition-all"><i class="fas fa-user-check mr-1"></i> 出席狀況</button>
            <button onclick="switchTab('service')" id="tab-service" class="hidden flex-1 min-w-[45%] py-2.5 bg-white text-gray-500 hover:bg-gray-50 rounded-xl border border-gray-200 font-bold text-sm transition-all"><i class="fas fa-book-reader mr-1"></i> 聯絡簿檢查</button>
        </div>

        <section id="section-common" class="block">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <h3 class="font-bold text-gray-800 mb-3 border-b border-gray-100 pb-2"><i class="fas fa-clipboard-check mr-2"></i>各項物品/回條繳交</h3>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="common-item-name" placeholder="輸入新物品，或點擊下方已有任務" class="flex-1 bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-blue-400">
                    <button id="btn-common-load" onclick="loadSubData('common')" class="bg-blue-100 text-blue-700 font-bold px-3 py-2 rounded-lg hover:bg-blue-200 text-sm whitespace-nowrap">載入</button>
                </div>
                <div id="common-existing-tags" class="flex flex-wrap gap-1.5 mb-4 items-center min-h-[24px]"></div>
                <div id="readonly-warning-common" class="hidden bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm font-bold border border-red-100">
                    <i class="fas fa-lock mr-2"></i>此任務由 <span id="task-creator-name-common" class="underline"></span> 建立，您僅有檢視權限。
                </div>
                <div id="common-assign-area" class="hidden mb-4 bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                    <label class="block text-xs font-bold text-indigo-700 mb-1"><i class="fas fa-magic mr-1"></i>快速指派特定學生 (輸入座號，如: 1,3,5 或 1-5)</label>
                    <div class="flex gap-2">
                        <input type="text" id="common-assign-input" placeholder="留空代表全班皆須繳交" class="flex-1 bg-white border border-indigo-200 rounded px-2 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
                        <button onclick="applyBatchAssign('common')" class="bg-indigo-600 text-white px-3 py-1.5 rounded shadow-sm text-sm font-bold hover:bg-indigo-700 transition">套用</button>
                    </div>
                </div>
                <div id="common-list" class="mb-4 max-h-[50vh] overflow-y-auto"><p class="text-center text-gray-400 text-sm py-4">請輸入名稱並載入名單</p></div>
                <div id="action-bar-common" class="hidden flex gap-2 mt-4">
                    <button onclick="quickDoneSub('common')" class="w-1/3 bg-green-100 text-green-700 font-bold py-3 rounded-lg shadow-sm hover:bg-green-200 transition text-sm"><i class="fas fa-check-double mr-1"></i>全班已交</button>
                    <button id="btn-common-save" onclick="saveSubData('common')" class="w-2/3 bg-blue-600 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-blue-700 transition"><i class="fas fa-save mr-2"></i> 儲存進度</button>
                </div>
            </div>
        </section>

        <section id="section-academic" class="hidden"> <div class="bg-white rounded-xl shadow-sm border border-orange-100 p-5"> <h3 class="font-bold text-orange-600 mb-4 border-b border-orange-100 pb-2"><i class="fas fa-pen-nib mr-2"></i>發布班級聯絡簿</h3> <textarea id="academic-content" rows="6" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-orange-400 outline-none mb-4" placeholder="請輸入今日作業、明日考試與攜帶物品..."></textarea> <div class="mb-4 bg-orange-50 p-3 rounded-lg border border-orange-100"> <label class="block text-sm font-bold text-orange-700 mb-2"><i class="fas fa-camera mr-1"></i>上傳黑板照片 (上限 5MB)</label> <input type="file" id="academic-file" accept="image/*,.pdf" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-white file:text-orange-600 hover:file:bg-orange-100 cursor-pointer"> <div id="academic-file-link" class="mt-2 text-sm text-gray-500"></div> </div> <button id="btn-academic-submit" onclick="submitAcademic()" class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-orange-600 transition"><i class="fas fa-paper-plane mr-2"></i> 上傳並發布</button> </div> </section>
        <section id="section-hygiene" class="hidden"> <div class="bg-white rounded-xl shadow-sm border border-teal-100 p-5"> <div class="flex justify-between items-center mb-4 border-b border-teal-100 pb-2"> <h3 class="font-bold text-teal-600"><i class="fas fa-broom mr-2"></i>打掃工作核實</h3> <button id="btn-hygiene-load" onclick="loadSubData('hygiene')" class="bg-teal-50 text-teal-600 font-bold py-1.5 px-3 rounded-lg border border-teal-200 hover:bg-teal-100 text-sm">載入名單</button> </div> <div id="hygiene-list" class="mb-4 max-h-[50vh] overflow-y-auto"><p class="text-center text-gray-400 text-sm py-4">請載入班級名單</p></div> <div id="action-bar-hygiene" class="hidden flex gap-2 mt-4"> <button onclick="quickDoneSub('hygiene')" class="w-1/3 bg-teal-100 text-teal-700 font-bold py-3 rounded-lg shadow-sm hover:bg-teal-200 transition text-sm"><i class="fas fa-check-double mr-1"></i>全班乾淨</button> <button id="btn-hygiene-save" onclick="saveSubData('hygiene')" class="w-2/3 bg-teal-600 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-teal-700 transition"><i class="fas fa-save mr-2"></i> 儲存打掃紀錄</button> </div> </div> </section>
        <section id="section-leader" class="hidden"> <div class="bg-white rounded-xl shadow-sm border border-purple-100 p-5"> <div class="flex justify-between items-center mb-4 border-b border-purple-100 pb-2"> <h3 class="font-bold text-purple-600"><i class="fas fa-mobile-alt mr-2"></i>手機繳交狀況</h3> <button id="btn-leader-load" onclick="loadSubData('leader')" class="bg-purple-50 text-purple-600 font-bold py-1.5 px-3 rounded-lg border border-purple-200 hover:bg-purple-100 text-sm">載入名單</button> </div> <div id="leader-list" class="mb-4 max-h-[50vh] overflow-y-auto"><p class="text-center text-gray-400 text-sm py-4">請載入班級名單</p></div> <div id="action-bar-leader" class="hidden flex gap-2 mt-4"> <button onclick="quickDoneSub('leader')" class="w-1/3 bg-purple-100 text-purple-700 font-bold py-3 rounded-lg shadow-sm hover:bg-purple-200 transition text-sm"><i class="fas fa-check-double mr-1"></i>全班已交</button> <button id="btn-leader-save" onclick="saveSubData('leader')" class="w-2/3 bg-purple-600 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-purple-700 transition"><i class="fas fa-save mr-2"></i> 儲存手機紀錄</button> </div> </div> </section>
        <section id="section-service" class="hidden"> <div class="bg-white rounded-xl shadow-sm border border-indigo-100 p-5"> <div class="flex justify-between items-center mb-4 border-b border-indigo-100 pb-2"> <h3 class="font-bold text-indigo-600"><i class="fas fa-book-reader mr-2"></i>聯絡簿繳交檢查</h3> <button id="btn-service-load" onclick="loadSubData('service')" class="bg-indigo-50 text-indigo-600 font-bold py-1.5 px-3 rounded-lg border border-indigo-200 hover:bg-indigo-100 text-sm">載入名單</button> </div> <div id="service-list" class="mb-4 max-h-[50vh] overflow-y-auto"><p class="text-center text-gray-400 text-sm py-4">請載入班級名單</p></div> <div id="action-bar-service" class="hidden flex gap-2 mt-4"> <button onclick="quickDoneSub('service')" class="w-1/3 bg-indigo-100 text-indigo-700 font-bold py-3 rounded-lg shadow-sm hover:bg-indigo-200 transition text-sm"><i class="fas fa-check-double mr-1"></i>全班已交</button> <button id="btn-service-save" onclick="saveSubData('service')" class="w-2/3 bg-indigo-600 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-indigo-700 transition"><i class="fas fa-save mr-2"></i> 儲存聯絡簿紀錄</button> </div> </div> </section>

        <section id="section-discipline" class="hidden"> 
            <div class="bg-white rounded-xl shadow-sm border border-red-100 p-5"> 
                <div id="discipline-schedule-area"> 
                    <div class="flex justify-between items-center mb-3 border-b border-red-100 pb-2"> 
                        <h3 class="font-bold text-red-600"><i class="fas fa-list-alt mr-2"></i>選擇點名節次</h3> 
                        <div class="flex gap-2">
                            <button onclick="openProxyLeaveModal()" class="text-blue-600 bg-blue-50 px-2 py-1 rounded text-xs font-bold hover:bg-blue-100 border border-blue-200 shadow-sm transition"><i class="fas fa-user-injured mr-1"></i>登記請假/早退</button>
                            <button onclick="fetchSchedule()" class="text-red-500 bg-red-50 px-2 py-1 rounded text-xs font-bold hover:bg-red-100 border border-red-200 shadow-sm transition"><i class="fas fa-sync-alt mr-1"></i>重整</button> 
                        </div>
                    </div> 
                    <div id="schedule-list" class="flex flex-col gap-2 mb-4"><p class="text-center text-gray-400 text-sm py-4">讀取課表中...</p></div> 
                    <div class="mt-4 pt-3 border-t border-gray-100 flex gap-2"> 
                        <input type="text" id="manual-period" placeholder="自訂(如:第9節)" class="flex-1 bg-gray-50 border border-gray-300 rounded px-2 py-1.5 text-sm outline-none"> 
                        <input type="text" id="manual-subject" placeholder="科目名稱(可留空)" class="flex-1 bg-gray-50 border border-gray-300 rounded px-2 py-1.5 text-sm outline-none"> 
                        <button onclick="startManualAttendance()" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-lg border border-red-200 shadow-sm text-sm font-bold hover:bg-red-100">建立</button> 
                    </div> 
                </div> 
                
                <div id="discipline-attendance-area" class="hidden"> 
                    <div class="flex justify-between items-center mb-4 border-b border-red-100 pb-2"> 
                        <h3 class="font-bold text-red-600"><i class="fas fa-user-clock mr-2"></i><span id="current-attendance-title">出缺席點名</span></h3> 
                        <button onclick="closeAttendanceArea()" class="bg-gray-100 text-gray-600 font-bold py-1 px-3 rounded-lg border border-gray-200 hover:bg-gray-200 text-sm shadow-sm"><i class="fas fa-arrow-left mr-1"></i> 返回</button> 
                    </div> 
                    <div id="discipline-list" class="mb-4 max-h-[60vh] overflow-y-auto"></div> 
                    <button id="btn-discipline-save" onclick="saveDiscipline()" class="hidden w-full bg-red-600 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-red-700 transition flex justify-center items-center"><i class="fas fa-save mr-2"></i> 儲存出缺席紀錄</button> 
                </div> 
            </div> 
        </section>
    </main>

    <div id="change-pwd-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all">
            <div class="bg-blue-700 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fas fa-user-lock mr-2"></i>更改個人密碼</h3>
                <button onclick="document.getElementById('change-pwd-modal').classList.add('hidden')" class="text-white hover:text-gray-300 outline-none"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">請輸入「舊」密碼</label>
                    <input type="password" id="self-old-pwd" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="驗證您的身分">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">請輸入「新」密碼</label>
                    <input type="password" id="self-new-pwd" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="支援 0 開頭">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-1">再次確認「新」密碼</label>
                    <input type="password" id="self-new-pwd-confirm" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="請再輸入一次">
                </div>
                <button id="btn-submit-change-pwd" onclick="submitChangePassword()" class="w-full bg-blue-700 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-800 transition">確認更改</button>
            </div>
        </div>
    </div>

    <div id="leave-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4"> <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all"> <div class="bg-blue-600 p-4 text-white flex justify-between items-center"> <h3 class="font-bold text-lg"><i class="fas fa-clipboard-list mr-2"></i>登記請假 / 早退</h3> <button onclick="document.getElementById('leave-modal').classList.add('hidden')" class="text-white hover:text-gray-200 outline-none"><i class="fas fa-times text-xl"></i></button> </div> <div class="p-6"> <div class="bg-blue-50 p-3 rounded mb-4 text-xs text-blue-800 border border-blue-100"> 💡 登記後，該名學生今日在所有的點名表中將自動預設為「請假」。 </div> <div class="mb-4"> <label class="block text-sm font-bold text-gray-700 mb-1">選擇學生</label> <select id="leave-stu-select" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"> <option value="">載入中...</option> </select> </div> <div class="mb-4"> <label class="block text-sm font-bold text-gray-700 mb-1">假別</label> <select id="leave-type" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"> <option value="病假">病假</option> <option value="事假">事假</option> <option value="公假">公假</option> <option value="喪假">喪假</option> <option value="早退">早退 (中途離校)</option> </select> </div> <div class="mb-6"> <label class="block text-sm font-bold text-gray-700 mb-1">事由 / 備註</label> <input type="text" id="leave-reason" placeholder="例如：發燒 / 第四節後離校" class="w-full border-gray-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"> </div> <button id="btn-submit-leave" onclick="submitProxyLeave()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 transition">確認送出</button> </div> </div> </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwunBwJT2u3gpAcnibQW4RBOQhuzQXLtcirT4_6G6fG9FgwJjTAApax5fU0VZ1dNvdRog/exec";
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const userRole = sessionStorage.getItem('userRole');
        const stuName = sessionStorage.getItem('studentName');
        const stuClass = sessionStorage.getItem('studentClass');
        const cadreTitle = sessionStorage.getItem('cadreTitle') || ''; 
        const myCreatorName = cadreTitle ? `${cadreTitle} ${stuName}` : stuName;
        
        // 🟢 取得登入帳號以備更改密碼
        const loginUsername = sessionStorage.getItem('username') || ''; 

        if (!isLoggedIn || userRole !== 'cadre') { alert('請先以幹部身分登入！'); window.location.href = 'login.html'; }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('display-name').innerText = stuName || '幹部'; 
            document.getElementById('display-class').innerText = stuClass || ''; 
            document.getElementById('display-title').innerText = cadreTitle || '一般幹部';
            
            const dateInput = document.getElementById('work-date');
            const today = new Date(); dateInput.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            let defaultTab = 'common';
            if (cadreTitle.includes('學藝')) { document.getElementById('tab-academic').classList.remove('hidden'); defaultTab = 'academic'; }
            if (cadreTitle.includes('衛生')) { document.getElementById('tab-hygiene').classList.remove('hidden'); defaultTab = 'hygiene'; }
            if (cadreTitle.includes('班長')) { document.getElementById('tab-leader').classList.remove('hidden'); defaultTab = 'leader'; }
            if (cadreTitle.includes('風紀')) { document.getElementById('tab-discipline').classList.remove('hidden'); defaultTab = 'discipline'; fetchSchedule(); }
            if (cadreTitle.includes('服務')) { document.getElementById('tab-service').classList.remove('hidden'); defaultTab = 'service'; }
            
            switchTab(defaultTab);
            
            dateInput.addEventListener('change', () => {
                if (cadreTitle.includes('風紀')) { closeAttendanceArea(); fetchSchedule(); }
                if (cadreTitle.includes('學藝') && !document.getElementById('section-academic').classList.contains('hidden')) { loadAcademic(); }
                
                ['common', 'hygiene', 'leader', 'service'].forEach(mode => { 
                    const listEl = document.getElementById(`${mode}-list`);
                    const actionEl = document.getElementById(`action-bar-${mode}`);
                    if (listEl) listEl.innerHTML = '<p class="text-center text-gray-400 text-sm py-4">請重新載入名單</p>'; 
                    if (actionEl) actionEl.classList.add('hidden'); 
                    if (mode === 'common') {
                        document.getElementById('common-assign-area').classList.add('hidden'); 
                        document.getElementById('readonly-warning-common').classList.add('hidden');
                    }
                });
                fetchExistingCommonItems();
            });
            fetchExistingCommonItems();
        });

        // 🟢 更改個人密碼邏輯
        function openChangePwdModal() {
            document.getElementById('self-old-pwd').value = '';
            document.getElementById('self-new-pwd').value = '';
            document.getElementById('self-new-pwd-confirm').value = '';
            document.getElementById('change-pwd-modal').classList.remove('hidden');
        }

        async function submitChangePassword() {
            const oldPwd = document.getElementById('self-old-pwd').value;
            const newPwd = document.getElementById('self-new-pwd').value;
            const confirmPwd = document.getElementById('self-new-pwd-confirm').value;

            if (!oldPwd || !newPwd || !confirmPwd) return alert("所有欄位皆必填！");
            if (newPwd !== confirmPwd) return alert("兩次輸入的新密碼不一致！");
            if (newPwd.length < 4) return alert("新密碼長度至少需要 4 碼！");
            if (!loginUsername) return alert("登入狀態異常，無法更改密碼。");

            const btn = document.getElementById('btn-submit-change-pwd');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>處理中...';
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'changeUserPassword', username: loginUsername, oldPassword: oldPwd, newPassword: newPwd }) 
                });
                const result = await response.json();
                alert(result.message);
                if (result.success) {

        async function openProxyLeaveModal() { const modal = document.getElementById('leave-modal'); const select = document.getElementById('leave-stu-select'); select.innerHTML = '<option value="">載入名單中...</option>'; modal.classList.remove('hidden'); let targetClass = stuClass; if (!targetClass) { select.innerHTML = '<option value="">請先選擇班級</option>'; return; } try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getHomeroomUsers', className: targetClass }) }); const result = await res.json(); if (result.success && result.students) { let html = '<option value="">請選擇學生...</option>'; result.students.forEach(st => { html += `<option value="${st.studentId}|${st.name}">${st.studentId} - ${st.name}</option>`; }); select.innerHTML = html; } else { select.innerHTML = '<option value="">載入失敗</option>'; } } catch(e) { select.innerHTML = '<option value="">網路異常</option>'; } } async function submitProxyLeave() { const dateStr = document.getElementById('work-date').value; const stuVal = document.getElementById('leave-stu-select').value; if (!stuVal) return alert('請選擇學生'); const [stuId, stuName] = stuVal.split('|'); const leaveType = document.getElementById('leave-type').value; const reason = document.getElementById('leave-reason').value.trim(); const btn = document.getElementById('btn-submit-leave'); btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>送出中...'; btn.disabled = true; try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'submitLeave', date: dateStr, stuClass: stuClass, stuId: stuId, stuName: stuName, leaveType: leaveType, reason: reason }) }); const result = await res.json(); alert("✅ 登記成功！該學生今日在所有的點名表中將會自動標示為「請假」。"); if (result.success) { document.getElementById('leave-modal').classList.add('hidden'); document.getElementById('leave-reason').value = ''; } } catch (e) { alert('連線異常'); } finally { btn.innerHTML = '確認送出'; btn.disabled = false; } } function switchTab(target) { const sections = ['common', 'academic', 'hygiene', 'leader', 'discipline', 'service']; sections.forEach(sec => { const sectionEl = document.getElementById(`section-${sec}`), tabEl = document.getElementById(`tab-${sec}`); if (!tabEl || tabEl.classList.contains('hidden')) return; if (sec === target) { sectionEl.classList.remove('hidden'); sectionEl.classList.add('block'); tabEl.className = `flex-1 min-w-[45%] py-2.5 bg-blue-600 text-white rounded-xl shadow-md font-bold text-sm transition-all transform scale-105`; } else { sectionEl.classList.remove('block'); sectionEl.classList.add('hidden'); tabEl.className = `flex-1 min-w-[45%] py-2.5 bg-white text-gray-500 hover:bg-gray-50 rounded-xl border border-gray-200 font-bold text-sm transition-all`; } }); if (target === 'academic') loadAcademic(); if (target === 'common') fetchExistingCommonItems(); } function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
        let attendanceData = [], currentPeriod = '', currentSubject = ''; async function fetchSchedule() { const date = document.getElementById('work-date').value; const container = document.getElementById('schedule-list'); container.innerHTML = '<p class="text-sm text-gray-500 text-center">讀取中...</p>'; try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getSchedule', date: date, className: stuClass }) }); const result = await res.json(); if (result.success) { if (result.isWeekend) { container.innerHTML = '<p class="text-sm text-gray-500 text-center py-2">假日無預設課表，請使用自訂節次。</p>'; } else if (result.schedule.length === 0) { container.innerHTML = `<p class="text-sm text-red-500 text-center">查無今日課表</p>`; } else { let html = ''; result.schedule.forEach((item, index) => { html += `<div class="flex items-center justify-between bg-red-50 p-2.5 rounded-lg border border-red-100 mb-2"><div class="font-bold text-red-700 w-16 text-sm text-center">${item.period}</div><div class="flex-1 px-2"><input type="text" id="subj-${index}" value="${item.subject}" class="w-full px-2 py-1.5 text-sm border rounded"></div><button onclick="startAttendance('${item.period}', '${index}')" class="bg-red-500 text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-sm hover:bg-red-600 transition">點名</button></div>`; }); container.innerHTML = html; } } else { container.innerHTML = `<p class="text-sm text-red-500 text-center">失敗：${result.message}</p>`; } } catch (e) { container.innerHTML = `<p class="text-sm text-red-500 text-center">連線異常</p>`; } } function startManualAttendance() { const p = document.getElementById('manual-period').value.trim(); const s = document.getElementById('manual-subject').value.trim(); if(p) startAttendance(p, s, true); } async function startAttendance(period, subjectOrIndex, isManual = false) { currentPeriod = period; let subj = isManual ? subjectOrIndex : document.getElementById(`subj-${subjectOrIndex}`).value.trim(); currentSubject = subj; const fullName = currentSubject ? `${period} - ${currentSubject}` : period; document.getElementById('current-attendance-title').innerText = fullName; document.getElementById('discipline-schedule-area').classList.add('hidden'); document.getElementById('discipline-attendance-area').classList.remove('hidden'); await loadDiscipline(fullName); } function closeAttendanceArea() { document.getElementById('discipline-attendance-area').classList.add('hidden'); document.getElementById('discipline-schedule-area').classList.remove('hidden'); } async function loadDiscipline(fullName) { const date = document.getElementById('work-date').value; const listDiv = document.getElementById('discipline-list'); listDiv.innerHTML = '<p class="text-center text-blue-500 py-4"><i class="fas fa-spinner fa-spin mr-2"></i>載入中...</p>'; document.getElementById('btn-discipline-save').classList.add('hidden'); try { const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'loadAttendance', date: date, className: stuClass, subject: fullName }) }); const result = await response.json(); if (result.success) { attendanceData = result.data; renderDisciplineList(); document.getElementById('btn-discipline-save').classList.remove('hidden'); } else { listDiv.innerHTML = `<p class="text-center text-red-500">失敗：${result.message}</p>`; } } catch (error) { listDiv.innerHTML = `<p class="text-center text-red-500">連線異常</p>`; } } function renderDisciplineList() { let html = ''; let savedCount = 0; attendanceData.forEach((st, idx) => { if (st.isSaved) savedCount++; let s = st.attendance || 'present'; let bg = 'bg-green-50'; if (s === 'leave') bg = 'bg-blue-50'; else if (s === 'late') bg = 'bg-yellow-50'; else if (s === 'absent') bg = 'bg-red-50'; let savedBadge = st.isSaved ? `<span class="ml-2 text-[10px] bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded shadow-sm"><i class="fas fa-check mr-1"></i>已存</span>` : ''; let parentLeaveBadge = (s === 'leave' && !st.isSaved) ? '<span class="ml-2 text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded font-bold">家長已請假</span>' : ''; html += `<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-3 mb-2 rounded-lg border border-gray-200 ${bg} transition-all"> <div class="font-bold text-gray-700 mb-2 sm:mb-0 flex items-center"> <span class="text-gray-400 mr-2 text-sm">${st.studentId}</span>${st.name} ${parentLeaveBadge} ${savedBadge} </div> <div class="flex gap-1 flex-wrap"> <button onclick="setAttendance(${idx}, 'present')" class="px-3 py-1 text-sm font-bold rounded ${s === 'present' ? 'bg-green-500 text-white shadow' : 'bg-white text-gray-500 border hover:bg-gray-100'}">出席</button> <button onclick="setAttendance(${idx}, 'late')" class="px-3 py-1 text-sm font-bold rounded ${s === 'late' ? 'bg-yellow-500 text-white shadow' : 'bg-white text-gray-500 border hover:bg-gray-100'}">遲到</button> <button onclick="setAttendance(${idx}, 'absent')" class="px-3 py-1 text-sm font-bold rounded ${s === 'absent' ? 'bg-red-500 text-white shadow' : 'bg-white text-gray-500 border hover:bg-gray-100'}">缺席</button> <button onclick="setAttendance(${idx}, 'leave')" class="px-3 py-1 text-sm font-bold rounded ${s === 'leave' ? 'bg-blue-500 text-white shadow' : 'bg-white text-gray-500 border hover:bg-gray-100'}">請假</button> </div> </div>`; }); if (savedCount > 0) { html = `<div class="mb-3 text-sm font-bold text-green-700 bg-green-100 p-2 rounded-lg border border-green-200 shadow-sm flex items-center justify-center"> <i class="fas fa-database mr-2"></i> 已成功載入 ${savedCount} 筆歷史紀錄 </div>` + html; } document.getElementById('discipline-list').innerHTML = html; } function setAttendance(idx, s) { if (attendanceData[idx].attendance === 'leave' && s !== 'leave' && !confirm('此學生目前為「請假」狀態，確定要覆蓋紀錄嗎？')) return; attendanceData[idx].attendance = s; attendanceData[idx].isSaved = false; renderDisciplineList(); } async function saveDiscipline() { const btn = document.getElementById('btn-discipline-save'); btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 儲存中...'; const finalSubjectName = document.getElementById('current-attendance-title').innerText; const records = attendanceData.map(st => ({ date: document.getElementById('work-date').value, className: stuClass, subject: finalSubjectName, studentId: st.studentId, name: st.name, attendance: st.attendance, comment: '' })); try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'batchSaveAttendance', records }) }); const result = await res.json(); if (result.success) { alert('儲存成功！'); closeAttendanceArea(); } else { alert('失敗：' + result.message); } } catch (e) { alert('連線異常'); } finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save mr-2"></i> 儲存出缺席紀錄'; } }
        async function loadAcademic() { const date = document.getElementById('work-date').value; const btn = document.getElementById('btn-academic-submit'); btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> 載入中...`; btn.disabled = true; try { const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'loadAnnouncement', date: date, className: stuClass }) }); const result = await response.json(); if(result.success) { document.getElementById('academic-content').value = result.content || ""; const linkDiv = document.getElementById('academic-file-link'); if(result.fileUrl) { let fileIdMatch = result.fileUrl.match(/[-\w]{25,}/); let fileId = fileIdMatch ? fileIdMatch[0] : ''; let imgTag = fileId ? `<div class="mt-3"><img src="https://drive.google.com/thumbnail?id=${fileId}&sz=w800" class="max-h-60 rounded-lg shadow-sm border border-orange-200" onerror="this.style.display='none';"></div>` : ''; linkDiv.innerHTML = `✅ 目前已有附件：<a href="${result.fileUrl}" target="_blank" class="text-orange-600 font-bold underline hover:text-orange-800">點此開啓原始檔案</a> <span class="text-xs text-gray-400 ml-2">(若重新上傳將會覆蓋)</span>${imgTag}`; } else { linkDiv.innerHTML = `<span class="text-gray-400">目前無附件</span>`; } } } catch(e) { console.error(e); } finally { btn.innerHTML = `<i class="fas fa-paper-plane mr-2"></i> 上傳並發布`; btn.disabled = false; } } async function submitAcademic() { const c = document.getElementById('academic-content').value.trim(); const fileInput = document.getElementById('academic-file'); const file = fileInput.files[0]; if (!c && !file) { return alert('請輸入聯絡簿內容，或是選擇上傳黑板照片！'); } const btn = document.getElementById('btn-academic-submit'); btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> 上傳發布中...`; btn.disabled = true; let payload = { action: 'saveAnnouncement', date: document.getElementById('work-date').value, className: stuClass, content: c, teacherName: `${cadreTitle} ${stuName}` }; if (file) { if (file.size > 5 * 1024 * 1024) { alert("檔案請勿超過 5MB！"); btn.innerHTML = `<i class="fas fa-paper-plane mr-2"></i> 上傳並發布`; btn.disabled = false; return; } const reader = new FileReader(); reader.onload = async function(e) { payload.fileData = e.target.result.split(',')[1]; payload.fileName = file.name; payload.mimeType = file.type; await sendAcademicRequest(payload, btn); }; reader.readAsDataURL(file); } else { await sendAcademicRequest(payload, btn); } } async function sendAcademicRequest(payload, btn) { try { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }); const result = await res.json(); if(result.success) { alert('🎉 發布成功！'); document.getElementById('academic-file').value = ''; loadAcademic(); } else { alert('發布失敗：' + result.message); } } catch(e){ alert('網路連線異常，請稍後再試。'); } finally { btn.innerHTML = `<i class="fas fa-paper-plane mr-2"></i> 上傳並發布`; btn.disabled = false; } }
        let subData = { common: { data: [], itemName: '' }, hygiene: { data: [], itemName: '打掃工作' }, leader: { data: [], itemName: '手機繳交' }, service: { data: [], itemName: '聯絡簿繳交' } };
        async function fetchExistingCommonItems() { const date = document.getElementById('work-date').value; const tagsContainer = document.getElementById('common-existing-tags'); tagsContainer.innerHTML = '<span class="text-xs text-gray-500 mr-1">今日任務：</span><span class="text-xs text-gray-400">載入中...</span>'; try { const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getSubmissionItems', date: date, className: stuClass }) }); const result = await response.json(); if (result.success) { const filteredItems = result.items.filter(item => item !== '手機繳交' && !item.includes('打掃') && !item.includes('聯絡簿')); if (filteredItems.length === 0) tagsContainer.innerHTML = '<span class="text-xs text-gray-500 mr-1">今日任務：</span><span class="text-xs text-gray-400">目前尚無紀錄</span>'; else { let html = '<span class="text-xs text-gray-500 mr-1">今日任務：</span>'; filteredItems.forEach(item => { html += `<button onclick="selectExistingItem('${item}')" class="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-2 py-0.5 rounded text-xs font-bold transition shadow-sm">${item}</button>`; }); tagsContainer.innerHTML = html; } } } catch (e) { tagsContainer.innerHTML = '<span class="text-xs text-gray-500 mr-1">今日任務：</span><span class="text-xs text-red-400">載入失敗</span>'; } } function selectExistingItem(itemName) { document.getElementById('common-item-name').value = itemName; loadSubData('common'); } async function loadSubData(mode) { let itemName = subData[mode].itemName; if (mode === 'common') { itemName = document.getElementById('common-item-name').value.trim(); if (!itemName) return alert('請輸入要登記的物品名稱，或點選下方已有任務標籤！'); subData.common.itemName = itemName; } const date = document.getElementById('work-date').value; const btn = document.getElementById(`btn-${mode}-load`); const listDiv = document.getElementById(`${mode}-list`); document.getElementById('readonly-warning-common')?.classList.add('hidden'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true; listDiv.innerHTML = '<p class="text-center text-blue-500 py-4"><i class="fas fa-circle-notch fa-spin mr-2"></i>載入中...</p>'; try { const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'loadSubmissions', date: date, className: stuClass, itemName: itemName }) }); const result = await response.json(); if (result.success) { subData[mode].data = result.data; let isReadOnly = false; if (mode === 'common' && result.creator && result.creator !== myCreatorName) { isReadOnly = true; document.getElementById('task-creator-name-common').innerText = result.creator; document.getElementById('readonly-warning-common').classList.remove('hidden'); } renderSubList(mode, isReadOnly); if (isReadOnly) { document.getElementById(`action-bar-${mode}`).classList.add('hidden'); if(mode === 'common') document.getElementById('common-assign-area').classList.add('hidden'); } else { document.getElementById(`action-bar-${mode}`).classList.remove('hidden'); if(mode === 'common') document.getElementById('common-assign-area').classList.remove('hidden'); } } else { listDiv.innerHTML = `<p class="text-center text-red-500 py-4">載入失敗：${result.message}</p>`; } } catch (error) { listDiv.innerHTML = '<p class="text-center text-red-500 py-4">網路連線異常</p>'; } finally { btn.innerHTML = '載入名單'; btn.disabled = false; } } function applyBatchAssign(mode) { const input = document.getElementById(`${mode}-assign-input`).value.trim(); if (!input) { subData[mode].data.forEach(st => { if (st.status === 'exempt') st.status = 'pending'; }); renderSubList(mode); return alert('已重置為「全班皆須繳交」。'); } let targetSeats = new Set(); input.split(',').forEach(p => { p = p.trim(); if (p.includes('-')) { let range = p.split('-'); let start = parseInt(range[0]), end = parseInt(range[1]); if (!isNaN(start) && !isNaN(end)) { for(let i=start; i<=end; i++) targetSeats.add(i.toString()); } } else { let seat = parseInt(p); if (!isNaN(seat)) targetSeats.add(seat.toString()); } }); let assignedCount = 0; subData[mode].data.forEach(st => { let seat1 = st.studentId.toString(); let seat2 = parseInt(seat1.slice(-2)).toString(); let seat3 = parseInt(seat1).toString(); if (targetSeats.has(seat1) || targetSeats.has(seat2) || targetSeats.has(seat3)) { if (st.status === 'exempt' || !st.status) st.status = 'pending'; assignedCount++; } else { st.status = 'exempt'; } }); renderSubList(mode); alert(`✅ 快速指派成功！\n已指派給 ${assignedCount} 位學生，其餘已自動設為「免交」。\n請點擊下方【儲存】生效。`); } function quickDoneSub(mode) { if (!subData[mode] || !subData[mode].data || subData[mode].data.length === 0) return; subData[mode].data.forEach(st => { if (st.status !== 'exempt' && st.status !== 'leave') st.status = 'done'; }); renderSubList(mode); }
        function renderSubList(mode, isReadOnly = false) { let html = ''; subData[mode].data.forEach((st, idx) => { let s = st.status || 'pending'; let bg = 'bg-yellow-50'; if (s === 'done') bg = 'bg-green-50'; else if (s === 'missing') bg = 'bg-red-50'; else if (s === 'none') bg = 'bg-gray-100'; else if (s === 'leave') bg = 'bg-blue-50'; else if (s === 'exempt') bg = 'bg-gray-200 opacity-60 grayscale'; html += `<div class="flex items-center justify-between p-3 mb-2 rounded-lg border border-gray-200 ${bg}"><div class="font-bold text-gray-700"><span class="text-gray-400 mr-2 text-sm">${st.studentId}</span>${st.name}</div><div class="flex gap-1">`; if (isReadOnly) { let badgeText = s==='done'?'已交':(s==='pending'?'未交':(s==='exempt'?'免交':(s==='leave'?'請假':'缺交'))); let badgeColor = s==='done'?'bg-green-100 text-green-700':(s==='pending'?'bg-yellow-100 text-yellow-700':(s==='exempt'?'bg-gray-100 text-gray-500':(s==='leave'?'bg-blue-100 text-blue-700':'bg-red-100 text-red-700'))); html += `<span class="${badgeColor} px-2 py-1 text-xs font-bold rounded">${badgeText}</span>`; } else { if (mode === 'hygiene') { html += `<button onclick="setSubStatus('${mode}', ${idx}, 'done')" class="px-2 py-1 text-xs font-bold rounded ${s === 'done' ? 'bg-green-500 text-white shadow' : 'bg-white text-gray-500 border'}">乾淨</button><button onclick="setSubStatus('${mode}', ${idx}, 'pending')" class="px-2 py-1 text-xs font-bold rounded ${s === 'pending' ? 'bg-yellow-500 text-white shadow' : 'bg-white text-gray-500 border'}">待加強</button><button onclick="setSubStatus('${mode}', ${idx}, 'missing')" class="px-2 py-1 text-xs font-bold rounded ${s === 'missing' ? 'bg-red-500 text-white shadow' : 'bg-white text-gray-500 border'}">未打掃</button>`; } else if (mode === 'leader') { html += `<button onclick="setSubStatus('${mode}', ${idx}, 'done')" class="px-2 py-1 text-xs font-bold rounded ${s === 'done' ? 'bg-green-500 text-white shadow' : 'bg-white text-gray-500 border'}">已交</button><button onclick="setSubStatus('${mode}', ${idx}, 'pending')" class="px-2 py-1 text-xs font-bold rounded ${s === 'pending' ? 'bg-yellow-500 text-white shadow' : 'bg-white text-gray-500 border'}">未交</button><button onclick="setSubStatus('${mode}', ${idx}, 'none')" class="px-2 py-1 text-xs font-bold rounded ${s === 'none' ? 'bg-gray-500 text-white shadow' : 'bg-white text-gray-500 border'}">未攜帶</button>`; } else if (mode === 'service') { html += `<button onclick="setSubStatus('${mode}', ${idx}, 'done')" class="px-2 py-1 text-xs font-bold rounded ${s === 'done' ? 'bg-green-500 text-white shadow' : 'bg-white text-gray-500 border'}">已交</button><button onclick="setSubStatus('${mode}', ${idx}, 'missing')" class="px-2 py-1 text-xs font-bold rounded ${s === 'missing' ? 'bg-red-500 text-white shadow' : 'bg-white text-gray-500 border'}">缺交</button><button onclick="setSubStatus('${mode}', ${idx}, 'leave')" class="px-2 py-1 text-xs font-bold rounded ${s === 'leave' ? 'bg-blue-500 text-white shadow' : 'bg-white text-gray-500 border'}">請假</button>`; } else { html += `<button onclick="setSubStatus('${mode}', ${idx}, 'done')" class="px-2 py-1 text-xs font-bold rounded ${s === 'done' ? 'bg-green-500 text-white shadow' : 'bg-white text-gray-500 border'}">已交</button><button onclick="setSubStatus('${mode}', ${idx}, 'pending')" class="px-2 py-1 text-xs font-bold rounded ${s === 'pending' ? 'bg-yellow-500 text-white shadow' : 'bg-white text-gray-500 border'}">未交</button><button onclick="setSubStatus('${mode}', ${idx}, 'exempt')" class="px-2 py-1 text-xs font-bold rounded ${s === 'exempt' ? 'bg-gray-500 text-white shadow' : 'bg-white text-gray-500 border'}">免交</button>`; } } html += `</div></div>`; }); document.getElementById(`${mode}-list`).innerHTML = html; } function setSubStatus(mode, idx, s) { subData[mode].data[idx].status = s; renderSubList(mode); } async function saveSubData(mode) { const date = document.getElementById('work-date').value; const itemName = subData[mode].itemName; const btn = document.getElementById(`btn-${mode}-save`); btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 儲存中...'; btn.disabled = true; const recordsToSave = subData[mode].data.map(st => ({ date: date, className: stuClass, itemName: itemName, studentId: st.studentId, name: st.name, status: st.status, creatorName: myCreatorName })); try { const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'batchSaveSubmissions', records: recordsToSave }) }); const result = await response.json(); if (result.success) { alert(`${itemName} 紀錄已成功儲存！`); if (mode === 'common') fetchExistingCommonItems(); } else alert('儲存失敗：' + result.message); } catch (error) { alert('網路連線異常，儲存失敗。'); } finally { btn.innerHTML = '<i class="fas fa-save mr-2"></i> 儲存紀錄'; btn.disabled = false; } }
